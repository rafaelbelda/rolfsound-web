<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolfsound — Next Gen Library</title>
  
  <link rel="stylesheet" href="/static/css/global.css">
  
  <style>
    /* ─── CSS ESPECÍFICO DO MOTOR 3D ─── */
    #webgl-container { 
      position: absolute; 
      inset: 0; 
      width: 100vw; 
      height: 100vh; 
      display: block; 
      cursor: grab;
      z-index: 10; 
    }
    #webgl-container:active { cursor: grabbing; }
    
    .loading { 
      position: absolute; 
      top: 50%; left: 50%; 
      transform: translate(-50%, -50%); 
      letter-spacing: 2px; 
      text-transform: uppercase; 
      font-size: 11px; 
      opacity: 0.6; 
      z-index: 50;
      pointer-events: none;
      color: var(--white); 
    }

    .btn-sync {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 10px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      pointer-events: auto;
    }
    .btn-sync:hover {
      background: var(--white);
      color: var(--black);
      border-color: var(--white);
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-left">
      <div class="logo-name">Rolfsound</div>
      <div class="logo-sub">VINYL ARCHIVE</div>
    </div>
    <div class="nav-center">
      <div class="pill-menu">
        <a href="/" class="pill-btn">Now Playing</a>
        <a href="/library" class="pill-btn active">Library</a>
      </div>
    </div>
    <div class="nav-right" style="display: flex; align-items: center;">
        <button id="btn-sync" class="btn-sync">SYNC COLLECTION</button>
    </div>
  </nav>

  <div class="bg-layer active" style="background-color: var(--black);"></div>
  <div id="loading" class="loading">Iniciando Motor 3D...</div>
  <div id="webgl-container"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ─── 0. VARIÁVEIS GLOBAIS ───
    let totalDiscos = 0; 
    const espacamento = 6;
    let minhaColecaoGlobal = [];

    // GRUPO DA ESTANTE (Global para evitar ReferenceError)
    const estanteGroup = new THREE.Group();
    estanteGroup.position.y = -7.5;

    // 1. SETUP DA CENA
    const container = document.getElementById('webgl-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.add(estanteGroup);

    // EFEITO DE NEBLINA (O segredo do drama nas pontas)
    scene.fog = new THREE.Fog(0x000000, 10, 60);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 30); 
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // 2. LUZES "DEEP DISCO" REVISADAS
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.02); 
    scene.add(ambientLight);

    const centerSpot = new THREE.SpotLight(0xffffff, 2500); 
    centerSpot.position.set(0, 25, 20);
    centerSpot.target.position.set(0, -7.5, 0); 
    centerSpot.angle = Math.PI / 6;
    centerSpot.penumbra = 0.8;
    centerSpot.decay = 1.8;
    centerSpot.distance = 150;
    centerSpot.castShadow = true;
    scene.add(centerSpot);
    scene.add(centerSpot.target);

    // Luzes de contorno para brilho nas lombadas
    const sideLightL = new THREE.PointLight(0xffffff, 100);
    sideLightL.position.set(-30, 0, 10);
    scene.add(sideLightL);

    const sideLightR = new THREE.PointLight(0xffffff, 100);
    sideLightR.position.set(30, 0, 10);
    scene.add(sideLightR);

    // PAREDE DE FUNDO (Para receber a penumbra/sombra)
    const wallGeo = new THREE.PlaneGeometry(1000, 200);
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1 });
    const wall = new THREE.Mesh(wallGeo, wallMat);
    wall.position.z = -10;
    wall.receiveShadow = true;
    scene.add(wall);

    // 3. FUNÇÃO DA API COM CACHE DE 24H
    async function buscarColecaoDiscogs() {
      const CACHE_KEY = 'rs_colecao_cache';
      const TIME_KEY = 'rs_colecao_timestamp';
      const TTL = 24 * 60 * 60 * 1000;

      try {
        const cache = localStorage.getItem(CACHE_KEY);
        const savedTime = localStorage.getItem(TIME_KEY);
        const agora = Date.now();

        if (cache && savedTime && (agora - savedTime < TTL)) {
          console.log("📦 Carregando do cache local...");
          return JSON.parse(cache);
        }

        const response = await fetch('/api/discogs/collection'); 
        const data = await response.json();
        
        if (!data.releases) return [];

        const colecao = data.releases.map(item => ({
          titulo: item.title,
          cover: item.cover || item.thumb 
        }));

        localStorage.setItem(CACHE_KEY, JSON.stringify(colecao));
        localStorage.setItem(TIME_KEY, agora.toString());
        return colecao;
      } catch (e) {
        const fallback = localStorage.getItem(CACHE_KEY);
        return fallback ? JSON.parse(fallback) : [];
      }
    }

    // 4. MONTAGEM DOS DISCOS
    const loader = new GLTFLoader();
    const textureLoader = new THREE.TextureLoader();

    loader.load('/static/models/disco.gltf', async (gltf) => {
      const discoBase = gltf.scene;
      discoBase.scale.set(5, 5, 5); 

      discoBase.traverse((child) => {
        if (child.isMesh) {
          if (child.name === 'Capa' || child.name === 'Contracapa') {
            child.material = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
          } else if (child.name === 'Disco') {
            child.material = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
          }
          child.castShadow = true;
        }
      });

      minhaColecaoGlobal = await buscarColecaoDiscogs();
      totalDiscos = minhaColecaoGlobal.length; 
      document.getElementById('loading').style.display = 'none';

      const anguloLateral = Math.PI / 2;

      minhaColecaoGlobal.forEach((album, index) => {
        const discoClone = discoBase.clone();
        const proxyUrl = `/api/discogs/image?url=${encodeURIComponent(album.cover)}`;

        textureLoader.load(proxyUrl, (textura) => {
          textura.colorSpace = THREE.SRGBColorSpace;
          textura.flipY = true; 

          // Extração da cor da lombada
          const canvas = document.createElement('canvas');
          canvas.width = 1; canvas.height = 1;
          const ctx = canvas.getContext('2d');
          const borderW = Math.max(1, textura.image.width * 0.05);
          ctx.drawImage(textura.image, 0, 0, borderW, textura.image.height, 0, 0, 1, 1);
          const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
          const corBorda = new THREE.Color(`rgb(${r}, ${g}, ${b})`).lerp(new THREE.Color(0x000000), 0.15);

          discoClone.traverse((child) => {
            if (child.isMesh) {
              if (child.name === 'Capa' || child.name === 'Contracapa') {
                child.material = child.material.clone();
                child.material.map = textura;
              } else if (child.name === 'Disco') {
                child.material = child.material.clone();
                child.material.color = corBorda;
              }
              child.material.needsUpdate = true;
            }
          });
        });

        const totalLargura = (totalDiscos - 1) * espacamento;
        const posX = (index * espacamento) - (totalLargura / 2);
        discoClone.position.x = posX;
        discoClone.rotation.y = posX <= 0 ? anguloLateral : -anguloLateral;

        estanteGroup.add(discoClone);
      });
    });

    // 5. ANIMAÇÃO E RESIZE
    const animate = () => {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    };
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 6. INTERAÇÃO (DRAG)
    let isDragging = false;
    let prevX = 0;
    container.addEventListener('mousedown', (e) => { isDragging = true; prevX = e.clientX; });
    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const delta = e.clientX - prevX;
        prevX = e.clientX;
        estanteGroup.position.x += delta * 0.1; 
        const limite = (totalDiscos * espacamento) / 2;
        estanteGroup.position.x = THREE.MathUtils.clamp(estanteGroup.position.x, -limite, limite);
      }
    });

    // 7. SYNC MANUAL
    document.getElementById('btn-sync').addEventListener('click', () => {
      if(confirm("Deseja sincronizar sua coleção?")) {
        localStorage.removeItem('rs_colecao_cache');
        localStorage.removeItem('rs_colecao_timestamp');
        window.location.reload();
      }
    });
  </script>
</body>
</html>
