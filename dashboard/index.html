<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolfsound</title>
  
  <link rel="stylesheet" href="/static/css/global.css">
  
  <script type="module">
    import AnimationEngine from '/static/js/AnimationEngine.js';
    window.AnimationEngine = AnimationEngine;
  </script>
  <script type="module" src="/static/js/RolfsoundIsland.js"></script>
  <script type="module" src="/static/js/playback-mitosis.js"></script>
</head>
<body>

  <div id="cursor-dot"></div>
  <rolfsound-island active-tab="library"></rolfsound-island>
  <div class="bg-layer active" style="background-color: var(--black);"></div>

  <section id="view-vinyl-library" class="view-layer active">
    {% include 'views/vinyl-library.html' %}
  </section>

  <section id="view-digital-library" class="view-layer" style="background: var(--black);">
    {% include 'views/digital-library.html' %}
  </section>

  <section id="view-settings" class="view-layer">
    {% include 'views/settings.html' %}
  </section>

  <script type="module">
    import Cursor from '/static/js/Cursor.js';
    import SearchController from '/static/js/SearchController.js';
    import ContextMenuController from '/static/js/ContextMenuController.js';

    const meuCursor = new Cursor();
    window.meuCursor = meuCursor;

    const island = document.querySelector('rolfsound-island');
    const views = {
        'library': document.getElementById('view-vinyl-library'),
        'digital': document.getElementById('view-digital-library'),
        'settings': document.getElementById('view-settings')
    };

    let libraryMode = 'vinyl'; // 'vinyl' | 'digital'

    // Inicia o SearchController apenas quando o custom element estiver registrado
    customElements.whenDefined('rolfsound-island').then(() => {
        window.searchController = new SearchController(island);
    });

    // Ajusta a aba inicial baseada na URL
    const path = window.location.pathname.replace('/', '') || 'library';
    if (views[path]) {
        island.setAttribute('active-tab', path);
        Object.values(views).forEach(v => v.classList.remove('active'));
        views[path].classList.add('active');
    } else if (path === 'playback') {
        // Playback é renderizado via Mitosis, não tem view dedicada
        island.setAttribute('active-tab', path);
    }

    // Transição suave quando clica na Ilha
    island.addEventListener('rolfsound-navigate', (e) => {
      navigateTo(e.detail.view);
    });

    // Troca entre Vinyl e Digital library
    island.addEventListener('rolfsound-library-mode-change', (e) => {
        libraryMode = e.detail.mode;

        // Move as duas views de library para overlay correto
        Object.values(views).forEach(v => { if(v) v.classList.remove('active'); });

        if (libraryMode === 'vinyl') {
            views['library'].classList.add('active');
        } else if (libraryMode === 'digital') {
            views['digital'].classList.add('active');
        }

        // Dispara um evento que a digital-library.html pode escutar
        window.dispatchEvent(new CustomEvent('rolfsound-library-mode-change', {
            detail: { mode: libraryMode }
        }));
    });

    function activateView(view) {
      if (view === 'playback') {
        island.setAttribute('active-tab', 'playback');
        Object.values(views).forEach(v => v.classList.remove('active'));
        return;
      }

      const target = views[view] || views['library'];
      island.setAttribute('active-tab', view in views ? view : 'library');
        Object.values(views).forEach(v => v.classList.remove('active'));
        if (target) target.classList.add('active');
    }

    function navigateTo(view) {
      activateView(view);
      const newUrl = view === 'library' ? '/library' : `/${view}`;
      window.history.pushState({}, '', newUrl);
    }

    window.contextMenuController = new ContextMenuController({
      island,
      onNavigate: navigateTo
    });

    window.addEventListener('popstate', () => {
        const view = window.location.pathname.replace('/', '') || 'library';
        if (view === 'playback') {
            // Playback triggered via popstate
            island.setAttribute('active-tab', 'playback');
            Object.values(views).forEach(v => v.classList.remove('active'));
        } else {
            activateView(view);
        }
    });
  </script>
</body>
</html>
