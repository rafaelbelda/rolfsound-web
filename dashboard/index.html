<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolfsound</title>
  
  <link rel="stylesheet" href="/static/css/global.css">
  
  <script type="module">
    import AnimationEngine from '/static/js/features/animations/AnimationEngine.js';
    window.AnimationEngine = AnimationEngine;
  </script>
  <script type="module" src="/static/js/channel/RolfsoundChannel.js"></script>
  <script type="module" src="/static/js/components/seek-bar/seek-bar.js"></script>
  <script type="module" src="/static/js/components/play-button/play-button.js"></script>
  <script type="module" src="/static/js/components/skip-buttons/skip-buttons.js"></script>
  <script type="module" src="/static/js/components/shuffle-toggle/shuffle-toggle.js"></script>
  <script type="module" src="/static/js/components/repeat-toggle/repeat-toggle.js"></script>
  <script type="module" src="/static/js/components/queue-button/queue-button.js"></script>
  <script type="module" src="/static/js/components/volume-slider/volume-slider.js"></script>
  <script type="module" src="/static/js/components/remix-button/remix-button.js"></script>
  <script type="module" src="/static/js/components/remix-panel/remix-panel.js"></script>
  <script type="module" src="/static/js/components/track-row/track-row.js"></script>
  <script type="module" src="/static/js/components/search-results/search-results.js"></script>
  <script type="module" src="/static/js/features/player/PlaybackStateStore.js"></script>
  <script type="module" src="/static/js/features/island/RolfsoundIsland.js"></script>
  <script type="module" src="/static/js/features/player/RolfsoundMiniplayer.js"></script>
  <script type="module" src="/static/js/features/island/playback-mitosis.js"></script>
</head>
<body>

  <div id="cursor-dot"></div>
  <rolfsound-island active-tab="library"></rolfsound-island>
  <rolfsound-miniplayer style="display:none"></rolfsound-miniplayer>
  <rolfsound-search-results></rolfsound-search-results>
  <div class="bg-layer active"></div>

  <section id="view-vinyl-library" class="view-layer active">
    {% include 'views/vinyl-library.html' %}
  </section>

  <section id="view-digital-library" class="view-layer">
    {% include 'views/digital-library.html' %}
  </section>

  <section id="view-settings" class="view-layer">
    {% include 'views/settings.html' %}
  </section>

  <script type="module">
    import Cursor from '/static/js/utils/Cursor.js';
    import SearchController from '/static/js/features/search/SearchController.js';
    import SearchLayoutCoordinator from '/static/js/features/search/SearchLayoutCoordinator.js';
    import ContextMenuController from '/static/js/features/search/ContextMenuController.js';
    import PlaylistController from '/static/js/features/library/PlaylistController.js';
    import UploadController from '/static/js/features/library/UploadController.js';

    const meuCursor = new Cursor();
    window.meuCursor = meuCursor;

    const island     = document.querySelector('rolfsound-island');
    const resultsEl  = document.querySelector('rolfsound-search-results');
    const views = {
        'library': document.getElementById('view-vinyl-library'),
        'digital': document.getElementById('view-digital-library'),
        'settings': document.getElementById('view-settings')
    };
    const STORAGE_KEYS = {
        libraryMode: 'rolfsound.libraryMode'
    };

    let libraryMode = readStoredLibraryMode(); // 'vinyl' | 'digital'
    island.setAttribute('library-mode', libraryMode);

    function normalizeLibraryMode(mode) {
      return mode === 'digital' ? 'digital' : 'vinyl';
    }

    function readStoredLibraryMode() {
      try {
        return normalizeLibraryMode(localStorage.getItem(STORAGE_KEYS.libraryMode));
      } catch (_) {
        return 'vinyl';
      }
    }

    function persistLibraryMode(mode) {
      try {
        localStorage.setItem(STORAGE_KEYS.libraryMode, mode);
      } catch (_) {}
    }

    function getActiveLibraryView() {
      return libraryMode === 'digital' ? views['digital'] : views['library'];
    }

    function emitLibraryModeChange() {
      window.dispatchEvent(new CustomEvent('rolfsound-library-mode-change', {
        detail: { mode: libraryMode }
      }));
    }

    function setLibraryMode(mode, { persist = true, emit = true } = {}) {
      libraryMode = normalizeLibraryMode(mode);
      island.setAttribute('library-mode', libraryMode);

      if (persist) {
        persistLibraryMode(libraryMode);
      }

      if (island.getAttribute('active-tab') === 'library') {
        Object.values(views).forEach(v => { if (v) v.classList.remove('active'); });
        const activeLibraryView = getActiveLibraryView();
        if (activeLibraryView) activeLibraryView.classList.add('active');
      }

      if (emit) {
        emitLibraryModeChange();
      }
    }

    // Inicia o SearchController e o SearchLayoutCoordinator
    customElements.whenDefined('rolfsound-island').then(() => {
        window.searchController = new SearchController(island);
        window.searchLayoutCoordinator = new SearchLayoutCoordinator(island, resultsEl);
    });

    // Acções globais das linhas de resultado de search
    // Tracks which downloads should auto-play on completion.
    const _pendingAutoplay = new Set(); // trackId

    function scheduleAutoplay(trackId) {
        _pendingAutoplay.add(trackId);
    }

    // Receive download progress via WebSocket — no polling needed.
    window.rolfsoundChannel.on('event.download_progress', async ({ track_id, resolved_track_id, asset_id, percent, status }) => {
        if (!_pendingAutoplay.has(track_id)) return;
        if (status === 'complete') {
            _pendingAutoplay.delete(track_id);
            const playTrackId = resolved_track_id || track_id;
            const pr = await fetch('/api/play', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ track_id: playTrackId, asset_id })
            });
            if (pr.ok) island?.showNotification?.({ text: 'Now playing', duration: 2200 });
        } else if (status === 'failed') {
            _pendingAutoplay.delete(track_id);
            island?.showNotification?.({ text: 'Download failed', duration: 2200 });
        }
    });

    window.addEventListener('rolfsound-search-row-action', async (e) => {
        const { action, track, source } = e.detail || {};
        if (!track) return;

        const trackId  = track.id || track.track_id || '';
        const filepath = track.file_path || track.filepath || '';

        const notify = (text) => island?.showNotification?.({ text, duration: 2200 });

        if (action === 'play' || action === 'download') {
            if (source === 'library' || filepath) {
                // Track already in library — play directly
                try {
                    const r = await fetch('/api/play', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ track_id: trackId, filepath })
                    });
                    if (r.ok) notify('Playing now');
                    else notify('Play failed');
                } catch { notify('Play failed'); }
            } else {
                // YouTube — trigger download, then handle based on response status
                try {
                    const r = await fetch('/api/downloads', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            track_id: trackId,
                            title: track.title || '',
                            thumbnail: track.thumbnail || ''
                        })
                    });
                    if (!r.ok) { notify('Download failed'); return; }
                    const data = await r.json();

                    if (data.status === 'exists') {
                        // Already in library — play right now
                        const playTrackId = data.track?.id || trackId;
                        const pr = await fetch('/api/play', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ track_id: playTrackId, asset_id: data.asset?.id })
                        });
                        if (pr.ok) notify('Playing now');
                        else notify('Play failed');
                    } else if (action === 'play') {
                        // Downloading — auto-play when ready
                        notify('Downloading… will play when ready');
                        scheduleAutoplay(trackId);
                    } else {
                        notify('Download started');
                    }
                } catch { notify('Download failed'); }
            }
        } else if (action === 'queue') {
            try {
                const r = await fetch('/api/queue/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        track_id: trackId,
                        filepath,
                        title: track.title || '',
                        thumbnail: track.thumbnail || ''
                    })
                });
                if (r.ok) notify('Added to queue');
                else notify('Queue failed');
            } catch { notify('Queue failed'); }
        }
    });

    // Atualiza estados das rows após mudança de playback
    window.addEventListener('rolfsound-now-playing-changed', () => {
        document.querySelector('rolfsound-search-results')?.refreshStates?.();
    });

    // Transição suave quando clica na Ilha
    island.addEventListener('rolfsound-navigate', (e) => {
      navigateTo(e.detail.view);
    });

    // Troca entre Vinyl e Digital library
    island.addEventListener('rolfsound-library-mode-change', (e) => {
        setLibraryMode(e.detail.mode);

        if (island.getAttribute('active-tab') === 'library') {
            window.history.replaceState({}, '', '/library');
        }
    });

    function activateView(view) {
      if (view === 'playback') {
        island.setAttribute('active-tab', 'playback');
        Object.values(views).forEach(v => v.classList.remove('active'));
        return;
      }

      const normalizedView = view === 'digital' ? 'library' : (view in views ? view : 'library');

      if (view === 'digital') {
        setLibraryMode('digital');
      }

      island.setAttribute('active-tab', normalizedView);
      Object.values(views).forEach(v => v.classList.remove('active'));

      if (normalizedView === 'library') {
        const target = getActiveLibraryView();
        if (target) target.classList.add('active');
        emitLibraryModeChange();
        return;
      }

      const target = views[normalizedView];
      if (target) target.classList.add('active');
    }

    function navigateTo(view) {
      activateView(view);
      const normalizedView = view === 'digital' ? 'library' : view;
      const newUrl = normalizedView === 'library' ? '/library' : `/${normalizedView}`;
      window.history.pushState({}, '', newUrl);
    }

    // Ajusta o estado inicial baseado na URL, tratando /digital como alias legado de /library
    const initialPath = window.location.pathname.replace('/', '') || 'library';
    if (initialPath === 'digital') {
        setLibraryMode('digital', { persist: true, emit: false });
        window.history.replaceState({}, '', '/library');
    } else {
        setLibraryMode(libraryMode, { persist: false, emit: false });
    }

    if (initialPath === 'playback') {
        island.setAttribute('active-tab', 'playback');
        Object.values(views).forEach(v => v.classList.remove('active'));
    } else {
        activateView(initialPath);
    }

    window.contextMenuController = new ContextMenuController({
      island,
      onNavigate: navigateTo
    });

    window.playlistController = new PlaylistController();

    window.uploadController = new UploadController();
    document.body.appendChild(window.uploadController);

    // Sistema de tema reativo — ambient lighting com as cores do álbum em reprodução
    import('/static/js/features/player/NowPlayingThemeController.js?v=theme-fidelity-20260426').then(({ default: NowPlayingThemeController }) => {
      window.nowPlayingThemeController = new NowPlayingThemeController();
    });

    window.addEventListener('popstate', () => {
        const view = window.location.pathname.replace('/', '') || 'library';
        if (view === 'playback') {
            island.setAttribute('active-tab', 'playback');
            Object.values(views).forEach(v => v.classList.remove('active'));
        } else {
            activateView(view);
        }
        // Let island and PlaybackMitosisManager react via the same event channel
        island.dispatchEvent(new CustomEvent('rolfsound-navigate', {
            bubbles: true, composed: true, detail: { view }
        }));
    });
  </script>
</body>
</html>
