<style>
  /* ─── CSS ESPECÍFICO DO MOTOR 3D ─── */
  #webgl-container { position: absolute; inset: 0; width: 100vw; height: 100vh; display: block; cursor: none; z-index: 10; }
  #webgl-container:active { cursor: none; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); letter-spacing: 2px; text-transform: uppercase; font-size: var(--fs-md, 11px); opacity: 0.6; z-index: 50; pointer-events: none; color: var(--white); transition: opacity 0.5s ease; }
    #pull-indicator { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); letter-spacing: 3px; text-transform: uppercase; font-size: var(--fs-sm, 10px); color: rgba(255, 255, 255, 0.4); z-index: 50; pointer-events: none; opacity: 0; transition: color 0.2s ease; }

  /* ─── HUD DE TIPOGRAFIA (ETIQUETAS) ─── */
  #labels-container {
      position: absolute; inset: 0;
      pointer-events: none; /* Deixa o clique passar para o 3D */
      z-index: 20; overflow: hidden;
  }
  .record-label {
      position: absolute; top: 0; left: 0;
      /* Alinha o texto à esquerda e empurra para cima do disco */
      transform: translate(0%, -100%); 
      display: flex; flex-direction: column; align-items: flex-start;
      opacity: 0; /* Começa invisível */
      transition: opacity 0.3s ease;
      will-change: transform, opacity; /* Otimização de GPU */

      padding-left: 2px;

      max-width: 200px;
  }
  .record-label .album {
      color: #ffffff;
      font-size: var(--fs-sm, 10px); font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 2px;
      white-space: normal;
      line-height: 1.2;
  }
  .record-label .artist {
      color: rgba(255, 255, 255, 0.4);
      font-size: var(--fs-xs, 9px); letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: normal;
      line-height: 1.2;
  }
</style>

<div id="loading">Iniciando Motor 3D...</div>
<div id="pull-indicator">Puxe para sincronizar</div>
<div id="webgl-container"></div>
<div id="labels-container"></div> <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import VinylRecord from '/static/js/VinylRecord.js';
  import AnimationEngine from '/static/js/AnimationEngine.js';

  // ─── 0. VARIÁVEIS GLOBAIS E ESTADO ───
  const espacamento = 6;
  const anguloLateral = Math.PI / 2;
  const PROFUNDIDADE_INVISIVEL = -25;
  
  let totalDiscos = 0; 
  let minhaColecaoGlobal = [];
  let currentCollection = []; // Array ordenado que a "Esteira" vai ler
  let isSyncing = false;
  let isFiltering = false;

  // ─── O MOTOR VIRTUAL (Object Pool) ───
  const MAX_MESHES = 45; // Teto máximo de RAM (impede travamentos)
  let meshPool = [];     // Guarda os clones 3D para reciclagem

// Máximo de texturas vivas na VRAM ao mesmo tempo.
// 80 cobre ~2× o MAX_MESHES (45) com folga para navegação rápida.
// Cada textura de capa em 500×500px ocupa ~1 MB de VRAM → 80 ≈ 80 MB.
// Ajuste para baixo (ex: 50) se estiver em hardware com pouca VRAM.
const TEXTURE_LRU_LIMIT = 80;

const textureLRU = {
    _cache: new Map(), // url → THREE.Texture

    has(url) {
        return this._cache.has(url);
    },

    get(url) {
        if (!this._cache.has(url)) return undefined;

        // ─── LRU touch: remove e reinseere no final para marcar como "recente" ───
        // O Map do JS preserva ordem de inserção, então o primeiro elemento
        // é sempre o "mais antigo" (candidato a eviction).
        const tex = this._cache.get(url);
        this._cache.delete(url);
        this._cache.set(url, tex);
        return tex;
    },

    set(url, texture) {
        // Se já existe, toca (move para o final) e não conta como novo
        if (this._cache.has(url)) {
            this._cache.delete(url);
            this._cache.set(url, texture);
            return;
        }

        // Eviction: se chegou no limite, descarta a textura mais antiga
        if (this._cache.size >= TEXTURE_LRU_LIMIT) {
            const oldestUrl = this._cache.keys().next().value;
            const oldestTex = this._cache.get(oldestUrl);

            // Three.js libera a VRAM ao chamar dispose()
            if (oldestTex && typeof oldestTex.dispose === 'function') {
                oldestTex.dispose();
            }

            this._cache.delete(oldestUrl);
        }

        this._cache.set(url, texture);
    },

    get size() {
        return this._cache.size;
    }
};

  const libraryLayer = document.getElementById('view-vinyl-library');
  const island = document.querySelector('rolfsound-island'); // MOVIDO PARA CIMA PARA ACESSO GLOBAL
  const estanteGroup = new THREE.Group();
  estanteGroup.position.y = -15; 

  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2(-100, -100); 
  let hoveredRecord = null; 

  // ─── 1. SETUP DO THREE.JS ───
  const container = document.getElementById('webgl-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  scene.add(estanteGroup);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 30); 
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  // Iluminação
  scene.add(new THREE.AmbientLight(0xffffff, 0.05)); 
  const crossedLightL = new THREE.DirectionalLight(0xffffff, 1.2); crossedLightL.position.set(-40, 10, 25); scene.add(crossedLightL);
  const crossedLightR = new THREE.DirectionalLight(0xffffff, 1.2); crossedLightR.position.set(40, 10, 25); scene.add(crossedLightR);

  const softShadowSpot = new THREE.SpotLight(0xffffff, 1800);
  softShadowSpot.position.set(0, 30, 40); softShadowSpot.target.position.set(0, -7.5, 0); 
  softShadowSpot.angle = Math.PI / 8; softShadowSpot.penumbra = 1.0; softShadowSpot.decay = 2.0; softShadowSpot.distance = 150;
  softShadowSpot.castShadow = true; softShadowSpot.shadow.mapSize.width = 1024; softShadowSpot.shadow.mapSize.height = 1024;
  scene.add(softShadowSpot); scene.add(softShadowSpot.target);

  const wall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 200), new THREE.ShadowMaterial({ opacity: 0.6 }));
  wall.position.z = -10; wall.receiveShadow = true; scene.add(wall);

  const textureLoader = new THREE.TextureLoader();

  // ─── 2. UTILS DE DADOS ───
  function getHueFromHex(hex) {
      if (!hex) return 0;
      let r = parseInt(hex.substring(1,3), 16) / 255, g = parseInt(hex.substring(3,5), 16) / 255, b = parseInt(hex.substring(5,7), 16) / 255;
      let max = Math.max(r, g, b), min = Math.min(r, g, b), h = 0;
      if (max === min) h = 0; else if (max === r) h = (g - b) / (max - min) + (g < b ? 6 : 0);
      else if (max === g) h = (b - r) / (max - min) + 2; else if (max === b) h = (r - g) / (max - min) + 4;
      return Math.round(h * 60);
  }

  async function buscarColecaoDiscogs() {
    const CACHE_KEY = 'rs_colecao_cache', TIME_KEY = 'rs_colecao_timestamp';
    try {
      const cache = localStorage.getItem(CACHE_KEY), savedTime = localStorage.getItem(TIME_KEY);
      if (cache && savedTime && (Date.now() - Number(savedTime) < 86400000)) return JSON.parse(cache);

      const response = await fetch('/api/discogs/collection'); 
      const data = await response.json();
      if (!data.releases) return [];

      const colecao = data.releases.map((item, index) => ({
        originalIndex: index, titulo: item.title, artista: item.artist, cover: item.cover,
        spine_color: item.spine_color || '#111111', hue: getHueFromHex(item.spine_color || '#111111'), 
        ano: item.year || 0, adicionado: item.date_added || Date.now() 
      }));

      localStorage.setItem(CACHE_KEY, JSON.stringify(colecao)); localStorage.setItem(TIME_KEY, Date.now().toString());
      return colecao;
    } catch (e) {
      const fallback = localStorage.getItem(CACHE_KEY); return fallback ? JSON.parse(fallback) : [];
    }
  }

  // ─── 3. A ESTEIRA INFINITA (Gerenciamento de Memória) ───
  function aplicarCapa(mesh, album) {
      // Aplica as cores na lombada e no miolo escuro do papelão
      mesh.traverse(child => {
          if (child.name === 'Spine') {
              child.material.color = new THREE.Color(album.spine_color);
              child.material.needsUpdate = true;
          } else if (child.name.startsWith('Cubo_')) {
              // Mistura a cor do disco com preto para fazer o miolo de papelão
              child.material.color = new THREE.Color(album.spine_color).lerp(new THREE.Color(0x000000), 0.85);
              child.material.needsUpdate = true;
          }
      });

      if (textureLRU.has(album.cover)) {
          setTextura(mesh, textureLRU.get(album.cover));
      } else {
          setTextura(mesh, null); // Loading cinza
          textureLoader.load(album.cover, (textura) => {
              textura.colorSpace = THREE.SRGBColorSpace; 
              textura.flipY = true; // Ajuste para UV de modelos exportados de Spline/Blender
              textura.anisotropy = renderer.capabilities.getMaxAnisotropy();
              textureLRU.set(album.cover, textura);
              
              if (mesh.userData.currentCover === album.cover) setTextura(mesh, textura);
          });
      }
      mesh.userData.currentCover = album.cover;
  }

  function setTextura(mesh, textura) {
      mesh.traverse(child => {
          if (child.name === 'Capa' || child.name === 'Contracapa') {
              if (textura) {
                  child.material.map = textura;
                  child.material.color.setHex(0xffffff); // Restaura o branco para não tingir a foto
              } else {
                  child.material.map = null;
                  child.material.color.setHex(0x1a1a1a); // Cor de Loading
              }
              child.material.needsUpdate = true;
          }
      });
  }

  function atualizarJanelaVirtual() {
      if (totalDiscos === 0 || isFiltering) return;

      const totalLargura = (totalDiscos - 1) * espacamento;
      let centerIndex = Math.round(((totalLargura / 2) - targetX) / espacamento);

      let halfWindow = Math.floor(MAX_MESHES / 2);
      let startIdx = Math.max(0, centerIndex - halfWindow);
      let endIdx = Math.min(totalDiscos - 1, centerIndex + halfWindow);

      let requiredIndices = new Set();
      for(let i = startIdx; i <= endIdx; i++) requiredIndices.add(i);

      // Apaga os discos que saíram da tela
      meshPool.forEach(slot => {
          if (slot.activeIndex !== null && !requiredIndices.has(slot.activeIndex)) {
              slot.activeIndex = null; 
              slot.mesh.visible = false;
          }
      });

      // Recicla e teleporta os discos que estão entrando na tela
      for (let i = startIdx; i <= endIdx; i++) {
          if (!meshPool.find(slot => slot.activeIndex === i)) {
              let freeSlot = meshPool.find(slot => slot.activeIndex === null);
              if (freeSlot) {
                  freeSlot.activeIndex = i;
                  freeSlot.mesh.visible = true;
                  
                  const album = currentCollection[i];
                  const posX = (i * espacamento) - (totalLargura / 2);
                  const rotY = anguloLateral;

                  freeSlot.recordInstance.data = album;
                  freeSlot.recordInstance.targetX = posX;
                  freeSlot.recordInstance.targetRotY = rotY;
                  freeSlot.recordInstance.mesh.position.x = posX;
                  freeSlot.recordInstance.mesh.rotation.y = rotY;
                  
                  // ─── ATUALIZA O TEXTO DA ETIQUETA HTML ───
                  freeSlot.label.querySelector('.album').innerText = album.titulo;
                  freeSlot.label.querySelector('.artist').innerText = album.artista;

                  // Reseta o estado físico para evitar bugs ao reciclar
                  freeSlot.recordInstance.state = 'IDLE';
                  freeSlot.recordInstance.mesh.position.y = freeSlot.recordInstance.baseY;

                  aplicarCapa(freeSlot.mesh, album);
              }
          }
      }
  }

  // ─── 4. MOTOR DE FILTROS (Cortina de Teatro com Efeito Cascata) ───
  function aplicarFiltro(tipoFiltro) {
      if (totalDiscos === 0 || isFiltering) return;
      isFiltering = true;

      // 1. Pega apenas os discos visíveis na tela e ordena pela posição X (esquerda pra direita)
      let discosVisiveis = meshPool.filter(slot => slot.activeIndex !== null);
      discosVisiveis.sort((a, b) => a.mesh.position.x - b.mesh.position.x);

      // 2. Manda afundar em CASCATA
      let delaySinking = 0;
      discosVisiveis.forEach(slot => {
          slot.recordInstance.state = 'SINKING';
          slot.recordInstance.delayFrames = delaySinking; 
          delaySinking += 4; // Ritmo da onda
      });

      // 3. Espera a onda terminar de afundar (800ms garante que todos desceram)
      setTimeout(() => {
          // Organiza os dados nos bastidores
          switch(tipoFiltro) {
              case 'all': 
                  currentCollection.sort((a, b) => {
                      // 1. Primeiro organizamos por Artista (Ordem Alfabética A-Z)
                      const artistaA = a.artista.toLowerCase();
                      const artistaB = b.artista.toLowerCase();
                      
                      if (artistaA < artistaB) return -1;
                      if (artistaA > artistaB) return 1;
                      
                      // 2. Se o artista for o mesmo, desempatamos pelo Ano (Mais antigo para o mais novo)
                      return a.ano - b.ano;
                  }); 
                  break;
              case 'new': currentCollection.sort((a, b) => new Date(b.adicionado) - new Date(a.adicionado)); break;
              case 'era': currentCollection.sort((a, b) => a.ano - b.ano); break;
              case 'palette': currentCollection.sort((a, b) => a.hue - b.hue); break;
              case 'frequent': currentCollection.sort(() => Math.random() - 0.5); break;
          }

          // NÃO resetamos o targetX aqui! Você continua olhando para o mesmo pedaço da prateleira.
          isFiltering = false; 
          meshPool.forEach(slot => slot.activeIndex = null);
          atualizarJanelaVirtual(); // Invoca as novas capas para preencher a tela

          // 4. Pega os discos novos que acabaram de ser posicionados e faz subir em CASCATA
          let discosNovosVisiveis = meshPool.filter(slot => slot.activeIndex !== null);
          discosNovosVisiveis.sort((a, b) => a.mesh.position.x - b.mesh.position.x);

          let delayEmerging = 0;
          discosNovosVisiveis.forEach(slot => {
              slot.recordInstance.mesh.position.y = PROFUNDIDADE_INVISIVEL;
              slot.recordInstance.state = 'EMERGING';
              slot.recordInstance.delayFrames = delayEmerging;
              delayEmerging += 4;
          });
      }, 800);
  }

  document.addEventListener('rolfsound-filter', (e) => { aplicarFiltro(e.detail.filter); });

  // ─── 5. MONTAGEM INICIAL (CORRIGIDA PARA NÃO TER CLIPPING) ───
  const loader = new GLTFLoader();

  loader.load('/static/models/disco.gltf', async (gltf) => {
    const discoBase = gltf.scene;
    // Escala para o modelo do Spline. Ajuste se ficar muito grande/pequeno.
    discoBase.scale.set(5, 5, 5); 
    
    const elementsToRemove = [];
    discoBase.traverse((child) => {
        if (child.isLight || child.isCamera) elementsToRemove.push(child);
    });
    elementsToRemove.forEach(el => el.removeFromParent());

    discoBase.traverse((child) => {
      if (child.isMesh) {
        // 1. Criamos um material base de luxo (com verniz/clearcoat)
        const materialPadrao = new THREE.MeshPhysicalMaterial({ 
            color: 0xffffff, 
            roughness: 0.25, 
            metalness: 0.1,  
            clearcoat: 0.3,  
            clearcoatRoughness: 0.2
        });
        
        // 2. O PULODE GATO CONTRA O CLIPPING (Z-FIGHTING)
        // Se for a face impressa, mandamos ela "pular" virtualmente para frente da câmera.
        if (child.name === 'Capa' || child.name === 'Contracapa') {
            materialPadrao.polygonOffset = true;
            materialPadrao.polygonOffsetFactor = -1; // <--- PUXA PARA FRENTE
            materialPadrao.polygonOffsetUnits = -1;
        }
        // Se for o miolo de suporte (papelão), removemos o brilho para imitar papelão opaco.
        else if (child.name.startsWith('Cubo_')) {
            materialPadrao.roughness = 0.8;
            materialPadrao.clearcoat = 0;
        }

        child.material = materialPadrao;
        child.castShadow = true; 
        child.receiveShadow = true;
      }
    });

    // ─── DOBRADIÇA (GATEFOLD) ───

    const pastaRaiz = discoBase.children[0];

    const hinge = new THREE.Group();
    hinge.name = 'GatefoldHinge';
    
    // O modelo tem 300 unidades de largura. A ponta esquerda (lombada) fica no X = -150.
    hinge.position.set(-150, 0, 0); 
    discoBase.add(hinge);

    pastaRaiz.add(hinge);

    discoBase.updateMatrixWorld(true);

    const capa = discoBase.getObjectByName('Capa');
    const cuboCapa = discoBase.getObjectByName('Cubo_Capa');

    if (capa) hinge.attach(capa);
    if (cuboCapa) hinge.attach(cuboCapa);

    minhaColecaoGlobal = await buscarColecaoDiscogs();
    currentCollection = [...minhaColecaoGlobal];
    
    currentCollection.sort((a, b) => {
        const artistaA = a.artista.toLowerCase();
        const artistaB = b.artista.toLowerCase();
        if (artistaA < artistaB) return -1;
        if (artistaA > artistaB) return 1;
        return a.ano - b.ano;
    });

    totalDiscos = currentCollection.length; 

    if (totalDiscos === 0) { document.getElementById('loading').innerText = 'Coleção vazia. Vá em Settings.'; return; }

    const numMeshesCriar = Math.min(totalDiscos, MAX_MESHES);
    const labelsContainer = document.getElementById('labels-container'); // Container das etiquetas HTML
    
    for (let i = 0; i < numMeshesCriar; i++) {
        const discoClone = discoBase.clone();
        
        // Clona os materiais para que as modificações de textura/cor não afetem os outros
        discoClone.traverse((child) => {
            if (child.isMesh) child.material = child.material.clone();
        });

        discoClone.visible = false;
        // Importante: No seu VinylRecord.js, garanta que a profundidade (Z) da Inspeção seja `baseZ` para manter o tamanho.
        const discoInteligente = new VinylRecord(discoClone, null, i);
        discoClone.userData.instance = discoInteligente;

        // ─── CRIA A ETIQUETA HTML PARA ESSE DISCO ───
        const labelDiv = document.createElement('div');
        labelDiv.className = 'record-label';
        labelDiv.innerHTML = `<span class="album"></span><span class="artist"></span>`;
        labelsContainer.appendChild(labelDiv);
        
        meshPool.push({ activeIndex: null, mesh: discoClone, recordInstance: discoInteligente, label: labelDiv });
        estanteGroup.add(discoClone);
    }

    targetX = 0;
    atualizarJanelaVirtual();

    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 500);
  });

  // ─── 6. INTERAÇÕES DE MOUSE E CLIQUES INTELIGENTES ───
  let isPointerDown = false; // Mouse apertado
  let isDragging = false;    // Se arrastou de verdade
  let startX = 0;            // Posição inicial do clique
  let prevX = 0, targetX = 0; 
  const MAX_OVERSHOOT = 10, pullIndicator = document.getElementById('pull-indicator');
  
  // VARIÁVEIS GLOBAIS PARA O MODO INSPEÇÃO
  let inspectedRecord = null; 
  let isWaitingToInspect = false;

  container.addEventListener('mousedown', (e) => { 
    if (libraryLayer && !libraryLayer.classList.contains('active')) return;
    if (inspectedRecord) return; // Trava o arrasto se estiver inspecionando

    isPointerDown = true; 
    isDragging = false; // Começamos presumindo que é um clique, não um arrasto!
    startX = e.clientX;
    prevX = e.clientX; 
    
    const dot = document.getElementById('cursor-dot');
    if (dot) { dot.style.width = '8px'; dot.style.height = '8px'; }
  });

  window.addEventListener('mousemove', (e) => {
    if (libraryLayer && !libraryLayer.classList.contains('active')) { 
        isPointerDown = false; isDragging = false; return; 
    }

    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    // Se o mouse está apertado e moveu mais de 5 pixels, aí sim ativamos o "Arrasto"
    if (isPointerDown && Math.abs(e.clientX - startX) > 5) {
        isDragging = true;
    }

    if (isDragging && !isSyncing && !isFiltering && !inspectedRecord) {
      const delta = e.clientX - prevX; prevX = e.clientX;
      let moveX = delta * 0.04, proposedX = targetX + moveX; 
      const limite = (totalDiscos * espacamento) / 2;

      if (proposedX > limite || proposedX < -limite) {
        proposedX = targetX + (moveX * 0.25); 
        const overshoot = Math.max(proposedX - limite, -limite - proposedX);
        pullIndicator.style.opacity = Math.min(overshoot / MAX_OVERSHOOT, 1).toString();
        if (overshoot > MAX_OVERSHOOT) { pullIndicator.innerText = "Solte para atualizar!"; pullIndicator.style.color = "var(--white)"; } 
        else { pullIndicator.innerText = "Puxe para sincronizar..."; pullIndicator.style.color = "rgba(255, 255, 255, 0.4)"; }
      } else { pullIndicator.style.opacity = '0'; }
      targetX = proposedX; 
    }
  });

  window.addEventListener('mouseup', (e) => { 
    if (!isPointerDown) return;
    isPointerDown = false;
    
    const dot = document.getElementById('cursor-dot');
    if (dot) { dot.style.width = ''; dot.style.height = ''; }

    if (isDragging) {
        // O usuário ARRASTOU a estante (Física de Snap e Sync)
        isDragging = false; 
        const limite = (totalDiscos * espacamento) / 2;
        const puxaoDireita = targetX - limite, puxaoEsquerda = -limite - targetX;

        if ((puxaoDireita > MAX_OVERSHOOT || puxaoEsquerda > MAX_OVERSHOOT) && !isSyncing) dispararSync();
        if (targetX > limite) targetX = limite; else if (targetX < -limite) targetX = -limite;
        pullIndicator.style.opacity = '0';
    } else {
        // O usuário apenas CLICOU sem mover (Dispara a Inspeção!)
        handleRecordClick(e);
    }
  });

  // ─── O CLIQUE CINEMATOGRÁFICO SEQUENCIADO ───
  function handleRecordClick(e) {
      if (isFiltering) return;
      
      const path = e.composedPath && e.composedPath();
      if (path && path.some(el => el.tagName === 'ROLFSOUND-ISLAND')) return;

      // Se clicar enquanto estiver inspecionando ou aguardando, cancela e devolve pra prateleira
      if (inspectedRecord) {
          if (!isWaitingToInspect) {
              inspectedRecord.state = 'RETURNING'; 
              AnimationEngine.undoMitosis(island); // Desfaz a mitose e destrava a ilha se clicar fora
          }
          inspectedRecord = null;
          isWaitingToInspect = false;
          return;
      }

      if (hoveredRecord) {
          inspectedRecord = hoveredRecord;
          
          // 1. Força a estante a centralizar perfeitamente o disco clicado
          targetX = -inspectedRecord.targetX;

          // 2. Em vez de mandar subir, colocamos ele na "fila de espera"
          isWaitingToInspect = true; 
      }
  }

  // Escuta o evento de fechar criado dinamicamente pela Mitose
  document.addEventListener('rolfsound-close-inspect', () => {
      if (inspectedRecord) {
          inspectedRecord.state = 'RETURNING'; 
          inspectedRecord = null;
          isWaitingToInspect = false;
          
          AnimationEngine.undoMitosis(island, 'btn-fechar'); // Destrói o botão de mitose específico
      }
  });

  // ─── 7. ANIMAÇÃO GERAL E RAYCASTER ───
  const tempV = new THREE.Vector3(); // Vetor usado para projetar o 3D no 2D (textos)

  const animate = () => {
    requestAnimationFrame(animate);
    
    if (libraryLayer && !libraryLayer.classList.contains('active')) return; 
    
    if (totalDiscos > 0) {
        estanteGroup.position.y = THREE.MathUtils.lerp(estanteGroup.position.y, -7.5, 0.05);
        estanteGroup.position.x = THREE.MathUtils.lerp(estanteGroup.position.x, targetX, 0.06);

        // ─── A MÁGICA DO SEQUENCIAMENTO ───
        // Se estamos aguardando a estante centralizar o disco...
        if (isWaitingToInspect && inspectedRecord) {
            // Mede a distância: se a estante chegou a menos de 0.5 unidades do alvo, dispara a decolagem!
            if (Math.abs(estanteGroup.position.x - targetX) < 0.5) {
                isWaitingToInspect = false;
                inspectedRecord.state = 'INSPECTING'; 
                
                // Dispara a Mitose Modular com a Ilha via AnimationEngine
                if (island) {
                    AnimationEngine.mitosis(island, {
                        id: 'btn-fechar',
                        icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="pointer-events: none;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`,
                        eventName: 'rolfsound-close-inspect', 
                        direction: 'right', 
                        distance: 245 // Distância para acomodar bem o botão fora da ilha principal
                    });
                }
            }
        }

        // A CÂMERA SEGUE O DISCO (Mas só começa a subir depois que a estante parou)
        if (inspectedRecord && !isWaitingToInspect) {
            camera.position.y = THREE.MathUtils.lerp(camera.position.y, 18, 0.04);
        } else {
            camera.position.y = THREE.MathUtils.lerp(camera.position.y, 0, 0.05);
        }

        atualizarJanelaVirtual();

        // ─── O NOVO CÉREBRO DO RAYCASTER E HOVER ───
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(estanteGroup.children, true);
        
        if (!inspectedRecord) {
            // 1. MODO NORMAL (Prateleira Livre)
            // Procura quem está sob o mouse e aplica o hover normalmente
            let currentHover = null;
            if (!isDragging && !isFiltering && intersects.length > 0) {
                let object = intersects[0].object;
                while(object.parent && !object.userData.instance) { object = object.parent; }
                if (object.userData.instance && object.visible) {
                    currentHover = object.userData.instance;
                }
            }

            if (hoveredRecord !== currentHover) {
                if (hoveredRecord) hoveredRecord.setHover(false);
                if (currentHover) currentHover.setHover(true);
                hoveredRecord = currentHover;
            }
        } else {
            // 2. MODO DE INSPEÇÃO (Foco total no disco)
            if (isWaitingToInspect) {
                // A estante está movendo. Forçamos o disco a continuar flutuando ("surfando") até o centro!
                inspectedRecord.setHover(true); 
            } else {
                // A estante parou e a animação de subir (INSPECTING) começou.
                // Matamos o hover para que o pulinho não brigue com o voo da câmera.
                if (hoveredRecord) {
                    hoveredRecord.setHover(false);
                    hoveredRecord = null;
                }
            }
        }

        meshPool.forEach(slot => {
            if (slot.mesh.visible) {
                slot.recordInstance.update();

                // ─── RASTREAMENTO DA ETIQUETA (3D para 2D) ───
                // Pegamos a posição X do disco (lombada) e subimos o Y em 10 unidades
                tempV.set(slot.mesh.position.x, slot.mesh.position.y + 10, slot.mesh.position.z);
                
                // Converte a posição local da estante para a posição global da cena
                estanteGroup.localToWorld(tempV);
                // Projeta na câmera para achar o equivalente em 2D
                tempV.project(camera);

                // Traduz a matemática (-1 a +1) para a resolução do seu monitor
                const screenX = (tempV.x * 0.5 + 0.5) * window.innerWidth;
                const screenY = (tempV.y * -0.5 + 0.5) * window.innerHeight;

                // Move a div instantaneamente pelo transform
                slot.label.style.transform = `translate(0%, -100%) translate(${screenX}px, ${screenY}px)`;

                // ─── LÓGICA DE VISIBILIDADE ───
                // Some com a tipografia se a estante estiver arrastando, ou se tiver algum disco em Inspeção
                if (isDragging || isWaitingToInspect || inspectedRecord || slot.recordInstance.state !== 'IDLE') {
                    slot.label.style.opacity = '0';
                } else {
                    slot.label.style.opacity = '1'; 
                }
            } else {
                // Se a esteira desativar o disco invisível, desativa o texto dele também
                slot.label.style.opacity = '0';
            }
        });
    }

    renderer.render(scene, camera);
  };
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ─── 8. MOTOR DE SYNC (Background Polling) ───
  // const island = ... (Foi movido para as variáveis globais lá em cima!)

  function monitorarProgressoSync() {
      const pollInterval = setInterval(async () => {
          try {
              const res = await fetch('/api/discogs/sync-status');
              const status = await res.json();
              
              if (island && island.updateNotificationText) AnimationEngine.updateNotificationText(island, status.message);

              if (!status.is_syncing && status.message !== "Iniciando motores...") {
                  clearInterval(pollInterval); 
                  if (status.message === "Concluído!") {
                      localStorage.removeItem('rs_colecao_cache'); localStorage.removeItem('rs_colecao_timestamp');
                      if(island) AnimationEngine.showNotification(island, { text: "Sincronização Perfeita!", duration: 2500 });
                      setTimeout(() => { window.location.reload(); }, 2500);
                  } else {
                      if(island) AnimationEngine.showNotification(island, { text: status.message, duration: 4000 });
                      isSyncing = false;
                  }
              }
          } catch (e) { console.warn("Falhando silenciosamente no radar..."); }
      }, 1000); 
  }

  async function dispararSync() {
    if (isSyncing) return;
    isSyncing = true;
    if(island) AnimationEngine.showNotification(island, { text: "Conectando ao Discogs...", spinner: true, duration: 0 });
    try {
      const res = await fetch('/api/discogs/sync', { method: 'POST' });
      if(res.ok) { monitorarProgressoSync(); } 
      else { if(island) AnimationEngine.showNotification(island, { text: "Falha de Conexão", duration: 3000 }); isSyncing = false; }
    } catch (e) { if(island) AnimationEngine.showNotification(island, { text: "Erro de Servidor", duration: 3000 }); isSyncing = false; }
  }

  document.addEventListener('rolfsound-sync-start', () => dispararSync());

  let isWakingUp = false, lastCheckTime = 0;
  document.addEventListener("visibilitychange", () => { if (document.visibilityState === 'visible' && !isWakingUp && !isSyncing) acordarESincronizar(); });
  window.addEventListener("online", () => { if (!isWakingUp && !isSyncing) acordarESincronizar(); });

  async function acordarESincronizar() {
    if (isSyncing) return;
    const now = Date.now(); if (now - lastCheckTime < 60000) return;
    lastCheckTime = now; isWakingUp = true;
    try {
      const checkRes = await fetch('/api/discogs/check-updates'); const checkData = await checkRes.json();
      if (checkData.has_updates) {
        isSyncing = true;
        let msgText = checkData.diff > 0 ? `${checkData.diff} novo(s) detectado(s).` : `Diferença detectada.`;
        if(island) AnimationEngine.showNotification(island, { text: msgText, spinner: true, duration: 0 });
        const syncRes = await fetch('/api/discogs/sync', { method: 'POST' });
        if(syncRes.ok) { monitorarProgressoSync(); } else { if(island) AnimationEngine.hideNotification(island); isSyncing = false; }
      }
    } catch (e) {} finally { isWakingUp = false; }
  }

  setTimeout(async () => {
    const now = Date.now(); if (now - lastCheckTime < 60000) return; lastCheckTime = now;
    try { await fetch('/api/discogs/check-updates'); } catch (_) {}
  }, 2000);
</script>
