<style>
  /* ─── CSS ESPECÍFICO DO MOTOR 3D ─── */
  #webgl-container { position: absolute; inset: 0; width: 100vw; height: 100vh; display: block; cursor: none; z-index: 10; }
  #webgl-container:active { cursor: none; }
  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); letter-spacing: 2px; text-transform: uppercase; font-size: 11px; opacity: 0.6; z-index: 50; pointer-events: none; color: var(--white); transition: opacity 0.5s ease; }
  #pull-indicator { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); letter-spacing: 3px; text-transform: uppercase; font-size: 10px; color: rgba(255, 255, 255, 0.4); z-index: 50; pointer-events: none; opacity: 0; transition: color 0.2s ease; }
</style>

<div id="loading">Iniciando Motor 3D...</div>
<div id="pull-indicator">Puxe para sincronizar</div>
<div id="webgl-container"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import VinylRecord from '/static/js/VinylRecord.js';

  // ─── 0. VARIÁVEIS GLOBAIS E ESTADO ───
  const espacamento = 6;
  const anguloLateral = Math.PI / 2;
  const PROFUNDIDADE_INVISIVEL = -25;
  
  let totalDiscos = 0; 
  let minhaColecaoGlobal = [];
  let currentCollection = []; // Array ordenado que a "Esteira" vai ler
  let isSyncing = false;
  let isFiltering = false;

  // ─── O MOTOR VIRTUAL (Object Pool) ───
  const MAX_MESHES = 45; // Teto máximo de RAM (impede travamentos)
  let meshPool = [];     // Guarda os clones 3D para reciclagem
  const textureCache = new Map(); // Cache de texturas para não baixar duas vezes

  const libraryLayer = document.getElementById('view-vinyl-library');
  const estanteGroup = new THREE.Group();
  estanteGroup.position.y = -15; 

  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2(-100, -100); 
  let hoveredRecord = null; 

  // ─── 1. SETUP DO THREE.JS ───
  const container = document.getElementById('webgl-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  scene.add(estanteGroup);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 30); 
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  // Iluminação
  scene.add(new THREE.AmbientLight(0xffffff, 0.05)); 
  const crossedLightL = new THREE.DirectionalLight(0xffffff, 1.2); crossedLightL.position.set(-40, 10, 25); scene.add(crossedLightL);
  const crossedLightR = new THREE.DirectionalLight(0xffffff, 1.2); crossedLightR.position.set(40, 10, 25); scene.add(crossedLightR);

  const softShadowSpot = new THREE.SpotLight(0xffffff, 1800);
  softShadowSpot.position.set(0, 30, 40); softShadowSpot.target.position.set(0, -7.5, 0); 
  softShadowSpot.angle = Math.PI / 8; softShadowSpot.penumbra = 1.0; softShadowSpot.decay = 2.0; softShadowSpot.distance = 150;
  softShadowSpot.castShadow = true; softShadowSpot.shadow.mapSize.width = 1024; softShadowSpot.shadow.mapSize.height = 1024;
  scene.add(softShadowSpot); scene.add(softShadowSpot.target);

  const wall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 200), new THREE.ShadowMaterial({ opacity: 0.6 }));
  wall.position.z = -10; wall.receiveShadow = true; scene.add(wall);

  const textureLoader = new THREE.TextureLoader();

  // ─── 2. UTILS DE DADOS ───
  function getHueFromHex(hex) {
      if (!hex) return 0;
      let r = parseInt(hex.substring(1,3), 16) / 255, g = parseInt(hex.substring(3,5), 16) / 255, b = parseInt(hex.substring(5,7), 16) / 255;
      let max = Math.max(r, g, b), min = Math.min(r, g, b), h = 0;
      if (max === min) h = 0; else if (max === r) h = (g - b) / (max - min) + (g < b ? 6 : 0);
      else if (max === g) h = (b - r) / (max - min) + 2; else if (max === b) h = (r - g) / (max - min) + 4;
      return Math.round(h * 60);
  }

  async function buscarColecaoDiscogs() {
    const CACHE_KEY = 'rs_colecao_cache', TIME_KEY = 'rs_colecao_timestamp';
    try {
      const cache = localStorage.getItem(CACHE_KEY), savedTime = localStorage.getItem(TIME_KEY);
      if (cache && savedTime && (Date.now() - Number(savedTime) < 86400000)) return JSON.parse(cache);

      const response = await fetch('/api/discogs/collection'); 
      const data = await response.json();
      if (!data.releases) return [];

      const colecao = data.releases.map((item, index) => ({
        originalIndex: index, titulo: item.title, artista: item.artist, cover: item.cover,
        spine_color: item.spine_color || '#111111', hue: getHueFromHex(item.spine_color || '#111111'), 
        ano: item.year || 0, adicionado: item.date_added || Date.now() 
      }));

      localStorage.setItem(CACHE_KEY, JSON.stringify(colecao)); localStorage.setItem(TIME_KEY, Date.now().toString());
      return colecao;
    } catch (e) {
      const fallback = localStorage.getItem(CACHE_KEY); return fallback ? JSON.parse(fallback) : [];
    }
  }

  // ─── 3. A ESTEIRA INFINITA (Gerenciamento de Memória) ───
  function aplicarCapa(mesh, album) {
      mesh.traverse(child => {
          if (child.name === 'Disco') {
              child.material.color = new THREE.Color(album.spine_color).lerp(new THREE.Color(0x000000), 0.15);
              child.material.needsUpdate = true;
          }
      });

      if (textureCache.has(album.cover)) {
          setTextura(mesh, textureCache.get(album.cover));
      } else {
          setTextura(mesh, null); // Loading cinza
          textureLoader.load(album.cover, (textura) => {
              textura.colorSpace = THREE.SRGBColorSpace; textura.flipY = true; 
              textura.anisotropy = renderer.capabilities.getMaxAnisotropy();
              textureCache.set(album.cover, textura);
              
              if (mesh.userData.currentCover === album.cover) setTextura(mesh, textura);
          });
      }
      mesh.userData.currentCover = album.cover;
  }

  function setTextura(mesh, textura) {
      mesh.traverse(child => {
          if (child.name === 'Capa' || child.name === 'Contracapa') {
              if (textura) {
                  child.material.map = textura;
                  child.material.color.setHex(0xffffff);
              } else {
                  child.material.map = null;
                  child.material.color.setHex(0x1a1a1a);
              }
              child.material.needsUpdate = true;
          }
      });
  }

  function atualizarJanelaVirtual() {
      if (totalDiscos === 0 || isFiltering) return;

      const totalLargura = (totalDiscos - 1) * espacamento;
      let centerIndex = Math.round(((totalLargura / 2) - targetX) / espacamento);

      let halfWindow = Math.floor(MAX_MESHES / 2);
      let startIdx = Math.max(0, centerIndex - halfWindow);
      let endIdx = Math.min(totalDiscos - 1, centerIndex + halfWindow);

      let requiredIndices = new Set();
      for(let i = startIdx; i <= endIdx; i++) requiredIndices.add(i);

      // Apaga os discos que saíram da tela
      meshPool.forEach(slot => {
          if (slot.activeIndex !== null && !requiredIndices.has(slot.activeIndex)) {
              slot.activeIndex = null; 
              slot.mesh.visible = false;
          }
      });

      // Recicla e teleporta os discos que estão entrando na tela
      for (let i = startIdx; i <= endIdx; i++) {
          if (!meshPool.find(slot => slot.activeIndex === i)) {
              let freeSlot = meshPool.find(slot => slot.activeIndex === null);
              if (freeSlot) {
                  freeSlot.activeIndex = i;
                  freeSlot.mesh.visible = true;
                  
                  const album = currentCollection[i];
                  const posX = (i * espacamento) - (totalLargura / 2);
                  const rotY = posX <= 0 ? anguloLateral : -anguloLateral;

                  freeSlot.recordInstance.data = album;
                  freeSlot.recordInstance.targetX = posX;
                  freeSlot.recordInstance.targetRotY = rotY;
                  freeSlot.recordInstance.mesh.position.x = posX;
                  freeSlot.recordInstance.mesh.rotation.y = rotY;
                  
                  // Reseta o estado físico para evitar bugs ao reciclar
                  freeSlot.recordInstance.state = 'IDLE';
                  freeSlot.recordInstance.mesh.position.y = freeSlot.recordInstance.baseY;

                  aplicarCapa(freeSlot.mesh, album);
              }
          }
      }
  }

  // ─── 4. MOTOR DE FILTROS (Cortina de Teatro com Efeito Cascata) ───
  function aplicarFiltro(tipoFiltro) {
      if (totalDiscos === 0 || isFiltering) return;
      isFiltering = true;

      // 1. Pega apenas os discos visíveis na tela e ordena pela posição X (esquerda pra direita)
      let discosVisiveis = meshPool.filter(slot => slot.activeIndex !== null);
      discosVisiveis.sort((a, b) => a.mesh.position.x - b.mesh.position.x);

      // 2. Manda afundar em CASCATA
      let delaySinking = 0;
      discosVisiveis.forEach(slot => {
          slot.recordInstance.state = 'SINKING';
          slot.recordInstance.delayFrames = delaySinking; 
          delaySinking += 4; // Ritmo da onda
      });

      // 3. Espera a onda terminar de afundar (800ms garante que todos desceram)
      setTimeout(() => {
          // Organiza os dados nos bastidores
          switch(tipoFiltro) {
              case 'all': currentCollection.sort((a, b) => a.originalIndex - b.originalIndex); break;
              case 'new': currentCollection.sort((a, b) => new Date(b.adicionado) - new Date(a.adicionado)); break;
              case 'era': currentCollection.sort((a, b) => a.ano - b.ano); break;
              case 'palette': currentCollection.sort((a, b) => a.hue - b.hue); break;
              case 'frequent': currentCollection.sort(() => Math.random() - 0.5); break;
          }

          // NÃO resetamos o targetX aqui! Você continua olhando para o mesmo pedaço da prateleira.
          isFiltering = false; 
          meshPool.forEach(slot => slot.activeIndex = null);
          atualizarJanelaVirtual(); // Invoca as novas capas para preencher a tela

          // 4. Pega os discos novos que acabaram de ser posicionados e faz subir em CASCATA
          let discosNovosVisiveis = meshPool.filter(slot => slot.activeIndex !== null);
          discosNovosVisiveis.sort((a, b) => a.mesh.position.x - b.mesh.position.x);

          let delayEmerging = 0;
          discosNovosVisiveis.forEach(slot => {
              slot.recordInstance.mesh.position.y = PROFUNDIDADE_INVISIVEL;
              slot.recordInstance.state = 'EMERGING';
              slot.recordInstance.delayFrames = delayEmerging;
              delayEmerging += 4;
          });
      }, 800);
  }

  document.addEventListener('rolfsound-filter', (e) => { aplicarFiltro(e.detail.filter); });


  // ─── 5. MONTAGEM INICIAL ───
  const loader = new GLTFLoader();

  loader.load('/static/models/disco.gltf', async (gltf) => {
    const discoBase = gltf.scene;
    discoBase.scale.set(5, 5, 5); 

    discoBase.traverse((child) => {
      if (child.isMesh) {
        if (child.name === 'Capa' || child.name === 'Contracapa') child.material = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
        else if (child.name === 'Disco') child.material = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        child.castShadow = true; child.receiveShadow = true;
      }
    });

    minhaColecaoGlobal = await buscarColecaoDiscogs();
    currentCollection = [...minhaColecaoGlobal];
    totalDiscos = currentCollection.length; 

    if (totalDiscos === 0) { document.getElementById('loading').innerText = 'Coleção vazia. Vá em Settings.'; return; }

    const numMeshesCriar = Math.min(totalDiscos, MAX_MESHES);
    
    for (let i = 0; i < numMeshesCriar; i++) {
        const discoClone = discoBase.clone();
        
        discoClone.traverse((child) => {
            if (child.isMesh) child.material = child.material.clone();
        });

        discoClone.visible = false;
        const discoInteligente = new VinylRecord(discoClone, null, i);
        discoClone.userData.instance = discoInteligente;
        
        meshPool.push({ activeIndex: null, mesh: discoClone, recordInstance: discoInteligente });
        estanteGroup.add(discoClone);
    }

    // CENTRALIZA A CÂMERA AO CARREGAR A PÁGINA
    targetX = 0;
    atualizarJanelaVirtual();

    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 500);
  });

  // ─── 6. INTERAÇÕES DE MOUSE ───
  let isDragging = false, prevX = 0, targetX = 0; 
  const MAX_OVERSHOOT = 10, pullIndicator = document.getElementById('pull-indicator');

  container.addEventListener('mousedown', (e) => { 
    if (libraryLayer && !libraryLayer.classList.contains('active')) return;
    isDragging = true; prevX = e.clientX; 
    const dot = document.getElementById('cursor-dot');
    if (dot) { dot.style.width = '8px'; dot.style.height = '8px'; }
  });

  window.addEventListener('mouseup', () => { 
    if (!isDragging) return;
    isDragging = false; 
    const dot = document.getElementById('cursor-dot');
    if (dot) { dot.style.width = ''; dot.style.height = ''; }

    const limite = (totalDiscos * espacamento) / 2;
    const puxaoDireita = targetX - limite, puxaoEsquerda = -limite - targetX;

    if ((puxaoDireita > MAX_OVERSHOOT || puxaoEsquerda > MAX_OVERSHOOT) && !isSyncing) dispararSync();
    if (targetX > limite) targetX = limite; else if (targetX < -limite) targetX = -limite;
    pullIndicator.style.opacity = '0';
  });

  window.addEventListener('mousemove', (e) => {
    if (libraryLayer && !libraryLayer.classList.contains('active')) { isDragging = false; return; }

    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    if (isDragging && !isSyncing && !isFiltering) {
      const delta = e.clientX - prevX; prevX = e.clientX;
      let moveX = delta * 0.04, proposedX = targetX + moveX; 
      const limite = (totalDiscos * espacamento) / 2;

      if (proposedX > limite || proposedX < -limite) {
        proposedX = targetX + (moveX * 0.25); 
        const overshoot = Math.max(proposedX - limite, -limite - proposedX);
        pullIndicator.style.opacity = Math.min(overshoot / MAX_OVERSHOOT, 1).toString();
        if (overshoot > MAX_OVERSHOOT) { pullIndicator.innerText = "Solte para atualizar!"; pullIndicator.style.color = "var(--white)"; } 
        else { pullIndicator.innerText = "Puxe para sincronizar..."; pullIndicator.style.color = "rgba(255, 255, 255, 0.4)"; }
      } else { pullIndicator.style.opacity = '0'; }
      targetX = proposedX; 
    }
  });

  // ─── 7. ANIMAÇÃO GERAL E RAYCASTER ───
  const animate = () => {
    requestAnimationFrame(animate);
    
    if (libraryLayer && !libraryLayer.classList.contains('active')) return; 
    
    if (totalDiscos > 0) {
        estanteGroup.position.y = THREE.MathUtils.lerp(estanteGroup.position.y, -7.5, 0.05);
        estanteGroup.position.x = THREE.MathUtils.lerp(estanteGroup.position.x, targetX, 0.06);

        atualizarJanelaVirtual();

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(estanteGroup.children, true);
        
        let currentHover = null;
        if (intersects.length > 0 && !isDragging && !isFiltering) {
            let object = intersects[0].object;
            while(object.parent && !object.userData.instance) { object = object.parent; }
            if (object.userData.instance && object.visible) {
                currentHover = object.userData.instance;
            }
        }

        if (hoveredRecord !== currentHover) {
            if (hoveredRecord) hoveredRecord.setHover(false);
            if (currentHover) currentHover.setHover(true);
            hoveredRecord = currentHover;
        }

        meshPool.forEach(slot => {
            if (slot.mesh.visible) slot.recordInstance.update();
        });
    }

    renderer.render(scene, camera);
  };
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ─── 8. MOTOR DE SYNC (Background Polling) ───
  const island = document.querySelector('rolfsound-island');

  function monitorarProgressoSync() {
      const pollInterval = setInterval(async () => {
          try {
              const res = await fetch('/api/discogs/sync-status');
              const status = await res.json();
              
              if (island.updateNotificationText) island.updateNotificationText(status.message);

              if (!status.is_syncing && status.message !== "Iniciando motores...") {
                  clearInterval(pollInterval); 
                  if (status.message === "Concluído!") {
                      localStorage.removeItem('rs_colecao_cache'); localStorage.removeItem('rs_colecao_timestamp');
                      island.showNotification({ text: "Sincronização Perfeita!", duration: 2500 });
                      setTimeout(() => { window.location.reload(); }, 2500);
                  } else {
                      island.showNotification({ text: status.message, duration: 4000 });
                      isSyncing = false;
                  }
              }
          } catch (e) { console.warn("Falhando silenciosamente no radar..."); }
      }, 1000); 
  }

  async function dispararSync() {
    if (isSyncing) return;
    isSyncing = true;
    island.showNotification({ text: "Conectando ao Discogs...", spinner: true, duration: 0 });
    try {
      const res = await fetch('/api/discogs/sync', { method: 'POST' });
      if(res.ok) { monitorarProgressoSync(); } 
      else { island.showNotification({ text: "Falha de Conexão", duration: 3000 }); isSyncing = false; }
    } catch (e) { island.showNotification({ text: "Erro de Servidor", duration: 3000 }); isSyncing = false; }
  }

  document.addEventListener('rolfsound-sync-start', () => dispararSync());

  let isWakingUp = false, lastCheckTime = 0;
  document.addEventListener("visibilitychange", () => { if (document.visibilityState === 'visible' && !isWakingUp && !isSyncing) acordarESincronizar(); });
  window.addEventListener("online", () => { if (!isWakingUp && !isSyncing) acordarESincronizar(); });

  async function acordarESincronizar() {
    if (isSyncing) return;
    const now = Date.now(); if (now - lastCheckTime < 60000) return;
    lastCheckTime = now; isWakingUp = true;
    try {
      const checkRes = await fetch('/api/discogs/check-updates'); const checkData = await checkRes.json();
      if (checkData.has_updates) {
        isSyncing = true;
        let msgText = checkData.diff > 0 ? `${checkData.diff} novo(s) detectado(s).` : `Diferença detectada.`;
        island.showNotification({ text: msgText, spinner: true, duration: 0 });
        const syncRes = await fetch('/api/discogs/sync', { method: 'POST' });
        if(syncRes.ok) { monitorarProgressoSync(); } else { island.hideNotification(); isSyncing = false; }
      }
    } catch (e) {} finally { isWakingUp = false; }
  }

  setTimeout(async () => {
    const now = Date.now(); if (now - lastCheckTime < 60000) return; lastCheckTime = now;
    try { await fetch('/api/discogs/check-updates'); } catch (_) {}
  }, 2000);
</script>
