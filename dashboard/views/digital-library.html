<style>
  #digital-library-container {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 80px 20px 20px 20px;
  }

  #digital-library-container::-webkit-scrollbar {
    width: 8px;
  }

  #digital-library-container::-webkit-scrollbar-track {
    background: transparent;
  }

  #digital-library-container::-webkit-scrollbar-thumb {
    background: var(--color-library-scroll-thumb);
    border-radius: var(--radius-xs);
  }

  #digital-library-container::-webkit-scrollbar-thumb:hover {
    background: var(--color-library-scroll-thumb-hover);
  }

  #tracks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }

  .track-card {
    background: var(--color-surface-card);
    backdrop-filter: blur(10px);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-xl);
    overflow: hidden;
    transition: all 0.2s ease;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }

  .track-card:hover {
    background: var(--color-surface-card-hover);
    border-color: var(--color-border-stronger);
    transform: translateY(-4px);
  }

  .track-thumbnail {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, var(--color-library-thumb-gradient-start), var(--color-library-thumb-gradient-end));
    object-fit: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .track-thumbnail img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .track-thumbnail-fallback {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--color-library-thumb-fallback-start), var(--color-library-thumb-fallback-end));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-size-icon-lg);
    color: var(--color-led);
  }

  .track-actions {
    position: absolute;
    inset: 0;
    background: var(--color-bg-scrim);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .track-card:hover .track-actions {
    opacity: 1;
  }

  .track-action-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-round);
    border: none;
    background: var(--color-surface-card-pressed);
    color: var(--color-text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .track-action-btn:hover {
    background: var(--color-surface-interactive-strong);
    transform: scale(1.1);
  }

  .track-info {
    flex: 1;
    padding: 10px;
    display: flex;
    flex-direction: column;
    min-height: 60px;
  }

  .track-title {
    font-size: var(--fs-sm, 10px);
    font-weight: 600;
    color: var(--color-text-primary);
    white-space: normal;
    line-height: 1.2;
    display: -webkit-box;
    line-clamp: 2;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .track-artist {
    font-size: var(--fs-2xs, 8px);
    color: var(--color-text-tertiary);
    white-space: normal;
    display: -webkit-box;
    line-clamp: 1;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  #digital-library-empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--color-text-muted);
    font-size: var(--fs-lg, 12px);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #digital-library-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-tertiary);
    font-size: var(--fs-md, 11px);
  }

  .empty-subtext {
    font-size: var(--fs-sm, 10px);
    opacity: 0.6;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--color-border-interactive);
    border-top-color: var(--color-text-secondary);
    border-radius: var(--radius-round);
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

<div id="digital-library-container">
  <div id="digital-library-loading" style="display: none;">
    <div class="spinner"></div>
    Loading...
  </div>
  <div id="digital-library-empty" style="display: none;">
    <div>No tracks yet</div>
    <div class="empty-subtext">Search and download music to build your library</div>
  </div>
  <div id="tracks-grid"></div>
</div>

<script type="module">
  const container = document.getElementById('view-digital-library');
  const grid = document.getElementById('tracks-grid');
  const loadingEl = document.getElementById('digital-library-loading');
  const emptyEl = document.getElementById('digital-library-empty');

  let allTracks = [];
  let libraryMode = 'vinyl'; // 'vinyl' | 'digital'

  // Normalise a thumbnail value to a browser-usable URL.
  // Local paths (anything not starting with 'http') are served via the
  // /thumbs/ static mount that maps to the music directory.
  function thumbSrc(t) {
    if (!t) return null;
    if (t.startsWith('http')) return t;
    return '/thumbs/' + t.split('/').pop();
  }

  // Escuta mudanças de modo (vinyl <-> digital)
  window.addEventListener('rolfsound-library-mode-change', (e) => {
    libraryMode = e.detail.mode;
    if (libraryMode === 'digital') {
      loadTracks();
    }
  });

  // Busca vinda da ilha (fallback) e do SearchController (preferencial)
  window.addEventListener('rolfsound-search', (e) => {
    const query = e.detail.query.toLowerCase();
    if (libraryMode === 'digital') {
      filterTracks(query);
    }
  });

  window.addEventListener('rolfsound-search-results', (e) => {
    if (libraryMode !== 'digital') return;

    // Se vier do controller para outra aba, ignora.
    if (e.detail?.tab && e.detail.tab !== 'digital' && e.detail.tab !== 'library') return;

    const query = (document.querySelector('rolfsound-island')
      ?.shadowRoot?.getElementById('search-input')?.value || '').toLowerCase();
    filterTracks(query);
  });

  async function loadTracks() {
    loadingEl.style.display = 'flex';
    grid.innerHTML = '';

    try {
      const response = await fetch('/api/library');
      if (!response.ok) throw new Error('Failed to fetch library');
      
      const data = await response.json();
      allTracks = data.tracks || [];

      loadingEl.style.display = 'none';

      if (allTracks.length === 0) {
        emptyEl.style.display = 'flex';
        grid.innerHTML = '';
      } else {
        emptyEl.style.display = 'none';
        renderTracks(allTracks);
      }
    } catch (error) {
      console.error('Error loading tracks:', error);
      loadingEl.style.display = 'none';
      emptyEl.style.display = 'flex';
    }
  }

  function filterTracks(query) {
    if (!query) {
      renderTracks(allTracks);
      return;
    }

    const filtered = allTracks.filter(track => {
      const title = (track.title || '').toLowerCase();
      const artist = (track.artist || '').toLowerCase();
      return title.includes(query) || artist.includes(query);
    });

    if (filtered.length === 0) {
      grid.innerHTML = '';
      emptyEl.style.display = 'flex';
      emptyEl.querySelector('div').textContent = 'No results';
    } else {
      emptyEl.style.display = 'none';
      renderTracks(filtered);
    }
  }

  function renderTracks(tracks) {
    grid.innerHTML = tracks.map(track => `
      <div class="track-card" data-track-id="${track.track_id || ''}">
        <div class="track-thumbnail">
          ${thumbSrc(track.thumbnail) ? `
            <img src="${thumbSrc(track.thumbnail)}" alt="${track.title}" loading="lazy" />
          ` : `
            <div class="track-thumbnail-fallback">♫</div>
          `}
          <div class="track-actions">
            <button class="track-action-btn play-btn" title="Play" aria-label="Play track">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </button>
            <button class="track-action-btn queue-btn" title="Add to Queue" aria-label="Add to queue">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="6" x2="21" y2="6"/>
                <line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/>
                <line x1="3" y1="12" x2="3.01" y2="12"/>
                <line x1="3" y1="18" x2="3.01" y2="18"/>
              </svg>
            </button>
            <button class="track-action-btn delete-btn" title="Delete" aria-label="Delete track">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                <line x1="10" y1="11" x2="10" y2="17"/>
                <line x1="14" y1="11" x2="14" y2="17"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="track-info">
          <div class="track-title">${track.title || 'Unknown'}</div>
          <div class="track-artist">${track.artist || 'Unknown Artist'}</div>
        </div>
      </div>
    `).join('');

    // Atach event listeners
    grid.querySelectorAll('.track-card').forEach(card => {
      const trackId = card.dataset.trackId;
      const track = tracks.find(t => t.track_id === trackId);

      card.querySelector('.play-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        playTrack(track);
      });

      card.querySelector('.queue-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        queueTrack(track);
      });

      card.querySelector('.delete-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteTrack(track);
      });
    });
  }

  function playTrack(track) {
    console.log('Play:', track);
    // TODO: Integrar com playback-mitosis.js
    fetch('/api/play', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        track_id: track.track_id,
        filepath: track.file_path,
        title: track.title,
        thumbnail: track.thumbnail
      })
    }).catch(e => console.error('Play error:', e));
  }

  function queueTrack(track) {
    console.log('Queue:', track);
    fetch('/api/queue/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        track_id: track.track_id,
        filepath: track.file_path,
        title: track.title,
        thumbnail: track.thumbnail
      })
    }).catch(e => console.error('Queue error:', e));
  }

  async function deleteTrack(track) {
    if (!confirm(`Delete "${track.title}"?`)) return;

    try {
      const response = await fetch(`/api/library/${track.track_id}`, { method: 'DELETE' });
      if (response.ok) {
        allTracks = allTracks.filter(t => t.track_id !== track.track_id);
        renderTracks(allTracks);
      }
    } catch (e) {
      console.error('Delete error:', e);
    }
  }

  // Load digital library ao entrar nessa view
  if (container && container.classList.contains('active')) {
    loadTracks();
  }
</script>
