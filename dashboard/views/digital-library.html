<style>

  }

    color: var(--color-text-secondary);

  }

  .dl-filter-btn:hover {
    border-color: var(--color-border-stronger);

  }

  .dl-filter-btn.active {

  .track-card:hover,
  .playlist-card:hover {

  .track-thumbnail,

    background: linear-gradient(135deg, var(--color-library-thumb-gradient-start), var(--color-library-thumb-gradient-end));

  .track-thumbnail img,

    display: grid;
    grid-template-columns: 1fr 1fr;

  .playlist-cover {

  .track-thumbnail-fallback {

  .track-actions {
    position: absolute;

  .track-card:hover .track-actions {
    opacity: 1;

  /* Action buttons spring in individually when the actions overlay appears */
  .track-action-btn {
    width: 36px;

    border-radius: var(--radius-round);

    background: var(--color-surface-card-pressed);

  .track-card:hover .track-action-btn {
    transform: scale(1);

  /* Stagger each button slightly — creates a cascade effect */
  .track-card:hover .track-action-btn:nth-child(1) { transition-delay: 0ms; }
  .track-card:hover .track-action-btn:nth-child(2) { transition-delay: 40ms; }
  .track-card:hover .track-action-btn:nth-child(3) { transition-delay: 80ms; }

  .track-action-btn:hover {

  .track-info,

  .track-title,

  .playlist-folder-backdrop {

  .playlist-folder-inner {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;

  .playlist-folder-header {

  .playlist-folder-header h3 {
    font-size: var(--fs-lg, 12px);

  .folder-close-btn {

    background: var(--color-surface-interactive);

  .folder-close-btn:hover {

  .playlist-folder-tracks {

    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));

  .playlist-folder-track {

  .playlist-folder-track-info {

  .playlist-folder-track-title {

  .folder-track-remove {

  .playlist-folder-track:hover .folder-track-remove { display: flex; }

  .folder-sort-select {
    appearance: none;

  .folder-sort-select:hover { border-color: var(--color-border-focus); }

  #playlist-picker {
    position: fixed;
    z-index: 390;
    inset: 0;
    display: none;

  }

  #playlist-picker.active {
    display: flex;

  .playlist-picker-backdrop {
    position: absolute;
    inset: 0;

  .playlist-picker-card {

  @keyframes spin {

</style>

<div id="digital-library-container">
  <div class="digital-library-toolbar">
    <button class="dl-filter-btn active" data-filter="all">All</button>
    <button class="dl-filter-btn" data-filter="tracks">Tracks</button>
    <button class="dl-filter-btn" data-filter="playlists">Playlists</button>
  </div>

  <div id="digital-library-loading" style="display: none;">
    <div class="spinner"></div>
    Loading...
  </div>

  <div id="digital-library-empty" style="display: none;">
    <div>No items</div>
    <div class="empty-subtext">Search and download music to build your library</div>
  </div>

  <div id="tracks-grid"></div>
</div>

<div id="playlist-picker" aria-hidden="true">
  <div class="playlist-picker-backdrop"></div>
  <div class="playlist-picker-card">
    <div class="playlist-picker-title">Add to playlist</div>
    <div class="playlist-picker-list" id="playlist-picker-list"></div>
    <div class="playlist-picker-actions">
      <button id="playlist-picker-create" type="button">New playlist</button>
      <button id="playlist-picker-close" type="button">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
  const container = document.getElementById('view-digital-library');
  const root = document.getElementById('digital-library-container');
  const grid = document.getElementById('tracks-grid');
  const loadingEl = document.getElementById('digital-library-loading');
  const emptyEl = document.getElementById('digital-library-empty');
  const emptyTitleEl = emptyEl?.querySelector('div');
  const emptySubtextEl = emptyEl?.querySelector('.empty-subtext');
  const picker = document.getElementById('playlist-picker');
  const pickerList = document.getElementById('playlist-picker-list');
  const pickerCreate = document.getElementById('playlist-picker-create');
  const pickerClose = document.getElementById('playlist-picker-close');
  const island = document.querySelector('rolfsound-island');

  let allTracks = [];
  let allPlaylists = [];
  let libraryMode = 'vinyl';
  let activeFilter = 'all';
  let pickerTrackId = '';
  let folderState = null;

  function thumbSrc(t) {
    if (!t) return null;
    if (t.startsWith('http') || t.startsWith('/thumbs/')) return t;
    return '/thumbs/' + t.split(/[\\/]/).pop();
  }

  function getThumbnailCandidates(track) {
    const normalized = thumbSrc(track?.thumbnail || '');
    const trackId = getTrackId(track);
    const isYouTubeId = typeof trackId === 'string' && /^[A-Za-z0-9_-]{11}$/.test(trackId);
    const isDiscogs = normalized && normalized.includes('discogs.com');

    const discogsCandidates = [];
    const youtubeCandidates = [];

    // Discogs tem prioridade — sobrescreve inconsistências do YouTube
    if (normalized && !normalized.includes('i.ytimg.com/vi/')) {
      discogsCandidates.push(normalized);
    }

    // YouTube como fallback
    if (isYouTubeId && !isDiscogs) {
      youtubeCandidates.push(`https://i.ytimg.com/vi/${trackId}/maxresdefault.jpg`);
      youtubeCandidates.push(`https://i.ytimg.com/vi/${trackId}/hqdefault.jpg`);
    }

    if (normalized && normalized.includes('i.ytimg.com/vi/')) {
      youtubeCandidates.push(normalized.replace(/\/(?:default|mqdefault|hqdefault|sddefault|maxresdefault)\.(?:jpg|webp).*$/i, '/maxresdefault.jpg'));
      youtubeCandidates.push(normalized.replace(/\/(?:default|mqdefault|hqdefault|sddefault|maxresdefault)\.(?:jpg|webp).*$/i, '/hqdefault.jpg'));
      youtubeCandidates.push(normalized);
    }

    return [...new Set([...discogsCandidates, ...youtubeCandidates].filter(Boolean))];
  }

  function cascadeImage(img, candidates) {
    if (!img || !Array.isArray(candidates) || !candidates.length) return;
    let idx = 0;
    img.onerror = () => {
      idx += 1;
      if (idx >= candidates.length) {
        img.onerror = null;
        return;
      }
      img.src = candidates[idx];
    };
  }

  function escapeHtml(value) {
    const div = document.createElement('div');
    div.textContent = value ?? '';
    return div.innerHTML;
  }

  function getTrackId(track) {
    return track?.id || track?.track_id || '';
  }

  function getTrackPath(track) {
    return track?.file_path || track?.filepath || '';
  }

  function getCurrentSearchQuery() {
    return (island?.shadowRoot?.getElementById('search-input')?.value || '').trim().toLowerCase();
  }

  function notify(text, spinner = false, duration = 2200) {
    if (typeof island?.showNotification === 'function') {
      island.showNotification({ text, spinner, duration });
    }
  }

  function refreshPlaybackStatus(delay = 200) {
    if (typeof window.playbackMitosisManager?.pollStatus === 'function') {
      window.setTimeout(() => window.playbackMitosisManager.pollStatus(), delay);
    }
  }

  function setEmptyState(title, subtitle = 'Search and download music to build your library') {
    if (emptyTitleEl) emptyTitleEl.textContent = title;
    if (emptySubtextEl) emptySubtextEl.textContent = subtitle;
    emptyEl.style.display = 'flex';
  }

  function clearEmptyState() {
    emptyEl.style.display = 'none';
    if (emptyTitleEl) emptyTitleEl.textContent = 'No items';
    if (emptySubtextEl) emptySubtextEl.textContent = 'Search and download music to build your library';
  }

  function findTrackById(trackId) {
    return allTracks.find(track => getTrackId(track) === trackId) || null;
  }

  async function loadData() {
    loadingEl.style.display = 'flex';
    grid.innerHTML = '';
    clearEmptyState();

    try {
      const [tracksRes, playlistsRes] = await Promise.all([
        fetch('/api/library'),
        fetch('/api/playlists')
      ]);

      if (!tracksRes.ok) throw new Error(`Failed to fetch library (${tracksRes.status})`);

      const tracksData = await tracksRes.json();
      allTracks = Array.isArray(tracksData.tracks) ? tracksData.tracks : [];

      if (playlistsRes.ok) {
        const playlistsData = await playlistsRes.json();
        allPlaylists = Array.isArray(playlistsData.playlists) ? playlistsData.playlists : [];
      } else {
        allPlaylists = [];
      }

      loadingEl.style.display = 'none';
      renderLibrary(getCurrentSearchQuery());
    } catch (error) {
      console.error('Error loading library:', error);
      loadingEl.style.display = 'none';
      grid.innerHTML = '';
      setEmptyState('Failed to load', 'Please try again in a moment');
    }
  }

  function renderLibrary(query = '') {
    const q = (query || '').trim().toLowerCase();

    const filteredTracks = allTracks.filter((track) => {
      if (!q) return true;
      const title = (track.title || '').toLowerCase();
      const artist = (track.artist || '').toLowerCase();
      return title.includes(q) || artist.includes(q);
    });

    const filteredPlaylists = allPlaylists.filter((playlist) => {
      if (!q) return true;
      return (playlist.name || '').toLowerCase().includes(q);
    });

    const showTracks = activeFilter === 'all' || activeFilter === 'tracks';
    const showPlaylists = activeFilter === 'all' || activeFilter === 'playlists';

    const visibleTracks = showTracks ? filteredTracks : [];
    const visiblePlaylists = showPlaylists ? filteredPlaylists : [];

    if (!visibleTracks.length && !visiblePlaylists.length) {
      grid.innerHTML = '';
      if (q) {
        setEmptyState('No results', 'Try another title, artist, or playlist name');
      } else if (activeFilter === 'playlists') {
        setEmptyState('No playlists yet', 'Right click a track and choose Add to playlist');
      } else {
        setEmptyState('No tracks yet');
      }
      return;
    }

    clearEmptyState();

    const playlistCards = visiblePlaylists.map((playlist) => {
      const playlistId = Number(playlist.id || 0);
      const trackCount = Number(playlist.track_count || 0);
      return `
        <div class="playlist-card" data-playlist-id="${playlistId}">
          <div class="playlist-covers">
            <div class="playlist-cover" data-playlist-id="${playlistId}" data-slot="0">♫</div>
            <div class="playlist-cover" data-playlist-id="${playlistId}" data-slot="1">♫</div>
            <div class="playlist-cover" data-playlist-id="${playlistId}" data-slot="2">♫</div>
            <div class="playlist-cover" data-playlist-id="${playlistId}" data-slot="3">♫</div>
          </div>
          <div class="playlist-info">
            <div class="playlist-title">${escapeHtml(playlist.name || 'Playlist')}</div>
            <div class="playlist-meta">${trackCount} tracks</div>
          </div>
        </div>
      `;
    }).join('');

    const trackCards = visibleTracks.map((track) => {
      const trackId = getTrackId(track);
      const title = escapeHtml(track.title || 'Unknown');
      const artist = escapeHtml(track.artist || 'Unknown Artist');
      const thumbnailCandidates = getThumbnailCandidates(track);
      const primaryThumbnail = thumbnailCandidates[0] || null;

      return `
        <div class="track-card" data-track-id="${escapeHtml(trackId)}">
          <div class="track-thumbnail">
            ${primaryThumbnail ? `
              <img src="${escapeHtml(primaryThumbnail)}" data-track-id="${escapeHtml(trackId)}" alt="${title}" loading="lazy" />
            ` : `
              <div class="track-thumbnail-fallback">♫</div>
            `}
            <div class="track-actions">
              <button class="track-action-btn play-btn" title="Play" aria-label="Play track">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="track-info">
            <div class="track-title">${title}</div>
            <div class="track-artist">${artist}</div>
          </div>
        </div>
      `;
    }).join('');

    grid.innerHTML = playlistCards + trackCards;

    hydrateTrackThumbnails(visibleTracks);
    hydratePlaylistCovers(visiblePlaylists);
  }

  function hydrateTrackThumbnails(tracks) {
    const images = grid.querySelectorAll('.track-thumbnail img[data-track-id]');

    images.forEach((img, index) => {
      const track = tracks[index];
      const candidates = getThumbnailCandidates(track);
      if (!candidates.length) return;
      cascadeImage(img, candidates);
    });
  }

  async function hydratePlaylistCovers(playlists) {
    await Promise.all(playlists.map(async (playlist) => {
      const playlistId = Number(playlist.id || 0);
      if (!playlistId) return;

      try {
        const res = await fetch(`/api/playlists/${playlistId}/tracks`);
        if (!res.ok) return;
        const data = await res.json();
        const tracks = Array.isArray(data.tracks) ? data.tracks.slice(0, 4) : [];
        const slots = grid.querySelectorAll(`.playlist-cover[data-playlist-id="${playlistId}"]`);
        slots.forEach((slot, slotIndex) => {
          const track = tracks[slotIndex];
          if (!track) {
            slot.textContent = '♫';
            return;
          }
          const candidates = getThumbnailCandidates(track);
          if (!candidates.length) {
            slot.textContent = '♫';
            return;
          }
          slot.innerHTML = `<img src="${escapeHtml(candidates[0])}" loading="lazy" alt="cover" />`;
          const img = slot.querySelector('img');
          cascadeImage(img, candidates);
        });
      } catch (error) {
        console.debug('playlist cover hydrate failed', error);
      }
    }));
  }

  function closePlaylistPicker() {
    picker.classList.remove('active');
    picker.setAttribute('aria-hidden', 'true');
    pickerTrackId = '';
  }

  function openPlaylistPicker(trackId) {
    pickerTrackId = trackId;
    pickerList.innerHTML = allPlaylists.map((playlist) => {
      const playlistId = Number(playlist.id || 0);
      const count = Number(playlist.track_count || 0);
      return `
        <div class="playlist-picker-item" data-playlist-id="${playlistId}">
          <span>${escapeHtml(playlist.name || 'Playlist')}</span>
          <span>${count}</span>
        </div>
      `;
    }).join('');

    if (!allPlaylists.length) {
      pickerList.innerHTML = `<div class="playlist-picker-item" style="cursor:default; opacity:.65;">No playlists yet</div>`;
    }

    picker.classList.add('active');
    picker.setAttribute('aria-hidden', 'false');
  }

  async function addTrackToPlaylist(trackId, playlistId) {
    try {
      const response = await fetch(`/api/playlists/${encodeURIComponent(playlistId)}/tracks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ track_id: trackId })
      });
      if (!response.ok) throw new Error(`Add to playlist failed (${response.status})`);
      notify('Added to playlist');
      await loadData();
    } catch (error) {
      console.error('Add to playlist error:', error);
      notify('Failed to add to playlist');
    }
  }

  async function createPlaylistAndMaybeAddTrack(trackId = '') {
    let name = '';
    if (typeof island?.promptPlaylistName === 'function') {
      name = (await island.promptPlaylistName({
        title: 'New playlist',
        placeholder: 'Type playlist name',
        confirmLabel: 'Create'
      }) || '').trim();
    } else {
      name = (window.prompt('Playlist name') || '').trim();
    }

    if (!name) return;

    try {
      const createRes = await fetch('/api/playlists', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });

      if (!createRes.ok) throw new Error(`Create playlist failed (${createRes.status})`);
      const playlist = await createRes.json();
      const playlistId = Number(playlist.id || 0);

      if (trackId && playlistId) {
        await addTrackToPlaylist(trackId, playlistId);
      } else {
        notify('Playlist created');
        await loadData();
      }

      window.dispatchEvent(new CustomEvent('rolfsound-playlist-created', {
        detail: { playlist }
      }));
    } catch (error) {
      console.error('Create playlist error:', error);
      notify('Failed to create playlist');
    }
  }

  async function playTrack(track) {
    const trackId = getTrackId(track);
    if (!trackId) {
      notify('Invalid track');
      return;
    }

    try {
      const response = await fetch('/api/play', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          track_id: trackId,
          filepath: getTrackPath(track)
        })
      });

      if (!response.ok) throw new Error(`Play failed (${response.status})`);

      notify('Playing now');
      refreshPlaybackStatus(150);
    } catch (e) {
      console.error('Play error:', e);
      notify('Play failed');
    }
  }

  async function queueTrack(track) {
    const trackId = getTrackId(track);
    if (!trackId) {
      notify('Invalid track');
      return;
    }

    try {
      const response = await fetch('/api/queue/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          track_id: trackId,
          filepath: getTrackPath(track),
          title: track.title || '',
          thumbnail: track.thumbnail || ''
        })
      });

      if (!response.ok) throw new Error(`Queue failed (${response.status})`);

      notify('Added to queue');
      refreshPlaybackStatus(120);
    } catch (e) {
      console.error('Queue error:', e);
      notify('Queue failed');
    }
  }

  async function deleteTrack(track) {
    const trackId = getTrackId(track);
    if (!trackId) {
      notify('Invalid track');
      return;
    }

    if (!confirm(`Delete "${track.title || 'this track'}"?`)) return;

    try {
      const response = await fetch(`/api/library/${encodeURIComponent(trackId)}`, { method: 'DELETE' });
      if (!response.ok) throw new Error(`Delete failed (${response.status})`);

      allTracks = allTracks.filter(t => getTrackId(t) !== trackId);
      renderLibrary(getCurrentSearchQuery());
      notify('Deleted');
      refreshPlaybackStatus(120);
    } catch (e) {
      console.error('Delete error:', e);
      notify('Delete failed');
    }
  }

  async function playPlaylist(playlistId) {
    try {
      const response = await fetch(`/api/playlists/${encodeURIComponent(playlistId)}/tracks`);
      if (!response.ok) throw new Error(`Playlist fetch failed (${response.status})`);
      const data = await response.json();
      const tracks = Array.isArray(data.tracks) ? data.tracks : [];
      if (!tracks.length) {
        notify('Playlist is empty');
        return;
      }

      await playTrack(tracks[0]);
      for (let i = 1; i < tracks.length; i += 1) {
        await queueTrack(tracks[i]);
      }
      notify(`Playing playlist (${tracks.length} tracks)`);
    } catch (error) {
      console.error('Play playlist error:', error);
      notify('Failed to play playlist');
    }
  }

  function buildFolderTrackCard(track, playlistId) {
    const trackId = getTrackId(track);
    const title   = escapeHtml(track.title  || 'Unknown');
    const artist  = escapeHtml(track.artist || '');
    const candidates = getThumbnailCandidates(track);
    const thumbnail  = candidates[0] || null;

    const playCount  = track.play_count  || 0;
    const skipRate   = track.skip_rate   != null ? Math.round(track.skip_rate * 100) : null;
    const lastPlayed = track.last_played
      ? new Date(track.last_played * 1000).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
      : null;

    const statsHtml = (playCount > 0 || lastPlayed)
      ? `<div class="folder-track-stats">${playCount > 0 ? `${playCount} plays` : ''}${lastPlayed ? ` · ${lastPlayed}` : ''}${skipRate !== null && playCount > 1 ? ` · ${skipRate}% skip` : ''}</div>`
      : '';

    return `
      <div class="playlist-folder-track" data-track-id="${escapeHtml(trackId)}" data-playlist-id="${playlistId || ''}">
        <div class="playlist-folder-track-thumb">
          ${thumbnail ? `<img src="${escapeHtml(thumbnail)}" loading="lazy" alt="${title}" />` : '♫'}
        </div>
        <div class="playlist-folder-track-info">
          <div class="playlist-folder-track-title">${title}</div>
          ${artist ? `<div class="playlist-folder-track-artist">${artist}</div>` : ''}
          ${statsHtml}
        </div>
        <button class="folder-track-remove" data-track-id="${escapeHtml(trackId)}" data-playlist-id="${playlistId || ''}"
                title="Remove from playlist" aria-label="Remove from playlist">
          <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
    `;
  }

  function closeFolder() {
    if (!folderState) return;

    const { backdrop, panel } = folderState;
    panel.style.opacity = '0';
    panel.style.transform = 'translate(-50%, -50%) scale(.82)';
    backdrop.classList.remove('active');

    window.setTimeout(() => {
      panel.remove();
      backdrop.remove();
    }, 210);

    folderState = null;
  }

  function bindFolderRemoveButtons(panel, playlistId) {
    panel.querySelectorAll('.folder-track-remove').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const trackId = btn.dataset.trackId;
        if (!trackId) return;
        try {
          const r = await fetch(`/api/playlists/${encodeURIComponent(playlistId)}/tracks/${encodeURIComponent(trackId)}`, {
            method: 'DELETE'
          });
          if (!r.ok) throw new Error('Remove failed');
          btn.closest('.playlist-folder-track')?.remove();
          // Refresh playlist card track count
          const card = document.querySelector(`.playlist-card[data-playlist-id="${playlistId}"]`);
          if (card) {
            const countEl = card.querySelector('.track-count, .playlist-track-count');
            if (countEl) {
              const cur = parseInt(countEl.textContent) || 0;
              if (cur > 0) countEl.textContent = String(cur - 1);
            }
          }
        } catch(err) { console.error('Remove track from playlist error:', err); }
      });
    });
  }

  function openPlaylistFolder(playlistCard, playlist, tracks) {
    closeFolder();

    const cardRect = playlistCard.getBoundingClientRect();
    const targetW = Math.min(window.innerWidth * 0.74, 860);
    const targetH = Math.min(window.innerHeight * 0.72, 560);

    const startScaleX = Math.max(0.18, cardRect.width / targetW);
    const startScaleY = Math.max(0.18, cardRect.height / targetH);

    const targetCenterX = window.innerWidth / 2;
    const targetCenterY = window.innerHeight / 2;
    const cardCenterX = cardRect.left + cardRect.width / 2;
    const cardCenterY = cardRect.top + cardRect.height / 2;

    const offsetX = cardCenterX - targetCenterX;
    const offsetY = cardCenterY - targetCenterY;

    const backdrop = document.createElement('div');
    backdrop.className = 'playlist-folder-backdrop';
    document.body.appendChild(backdrop);

    const panel = document.createElement('div');
    panel.className = 'playlist-folder';
    panel.style.width = `${targetW}px`;
    panel.style.height = `${targetH}px`;
    panel.style.left = '50%';
    panel.style.top = '50%';
    panel.style.opacity = '0';
    panel.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px)) scale(${startScaleX}, ${startScaleY})`;

    const playlistId = playlist.id;

    const renderFolderTracks = (trackList) =>
      trackList.map(t => buildFolderTrackCard(t, playlistId)).join('')
      || '<div style="padding:32px;text-align:center;color:var(--color-text-disabled);font-size:var(--fs-sm)">Playlist is empty</div>';

    panel.innerHTML = `
      <div class="playlist-folder-inner">
        <div class="playlist-folder-header">
          <h3 class="folder-title">${escapeHtml(playlist.name || 'Playlist')}</h3>
          <div style="display:flex;align-items:center;gap:6px">
            <select class="folder-sort-select" title="Sort tracks" aria-label="Sort tracks">
              <option value="position">Default order</option>
              <option value="title">Title A-Z</option>
              <option value="artist">Artist A-Z</option>
              <option value="duration-desc">Duration ↓</option>
              <option value="streams-desc">Most played</option>
              <option value="added_at-desc">Recently added</option>
            </select>
            <button class="folder-close-btn hover-target" type="button" aria-label="Close playlist">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M18 6 6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="playlist-folder-tracks">
          ${renderFolderTracks(tracks)}
        </div>
      </div>
    `;

    document.body.appendChild(panel);

    const folderImages = panel.querySelectorAll('.playlist-folder-track-thumb img');
    folderImages.forEach((img, i) => {
      const candidates = getThumbnailCandidates(tracks[i]);
      cascadeImage(img, candidates);
    });

    requestAnimationFrame(() => {
      backdrop.classList.add('active');
      panel.style.opacity = '1';
      panel.style.transform = 'translate(-50%, -50%) scale(1, 1)';
    });

    panel.querySelector('.folder-close-btn')?.addEventListener('click', closeFolder);
    backdrop.addEventListener('click', closeFolder);

    // Sort dropdown
    panel.querySelector('.folder-sort-select')?.addEventListener('change', async (e) => {
      const val = e.target.value;
      let sortField = val, sortOrder = 'asc';
      if (val.endsWith('-desc')) { sortField = val.slice(0, -5); sortOrder = 'desc'; }
      try {
        const res = await fetch(`/api/playlists/${encodeURIComponent(playlistId)}/tracks?sort=${sortField}&order=${sortOrder}`);
        if (!res.ok) return;
        const data = await res.json();
        const sortedTracks = Array.isArray(data.tracks) ? data.tracks : [];
        panel.querySelector('.playlist-folder-tracks').innerHTML = renderFolderTracks(sortedTracks);
        // Re-bind remove buttons after re-render
        bindFolderRemoveButtons(panel, playlistId);
      } catch(err) { console.error('Sort error:', err); }
    });

    // Play track on click
    panel.querySelector('.playlist-folder-tracks')?.addEventListener('click', async (event) => {
      if (event.target.closest('.folder-track-remove')) return;  // ignore remove btn clicks
      const trackCard = event.target.closest('.playlist-folder-track');
      if (!trackCard) return;
      const track = findTrackById(trackCard.dataset.trackId || '');
      if (!track) {
        notify('Track unavailable');
        return;
      }
      await playTrack(track);
    });

    bindFolderRemoveButtons(panel, playlistId);

    folderState = { backdrop, panel };
  }

  const onContextBuild = (e) => {
    const context = e.detail?.context;
    const items = e.detail?.items;

    if (!context || !Array.isArray(items)) return;
    if (libraryMode !== 'digital' || !container?.classList.contains('active')) return;

    const card = context.cardElement || context.target?.closest?.('.track-card');
    if (!card || !grid.contains(card) || !card.classList.contains('track-card')) return;

    const track = findTrackById(card.dataset.trackId || '');
    if (!track) return;

    const trackId = getTrackId(track) || 'track';

    const playIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
    const queueIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 9v2h14V9H7z"/></svg>`;
    const deleteIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>`;

    items.push(
      {
        id: `play-${trackId}`,
        label: 'Play',
        icon: playIcon,
        action: () => playTrack(track)
      },
      {
        id: `queue-${trackId}`,
        label: 'Add to Queue',
        icon: queueIcon,
        action: () => queueTrack(track)
      },
      { type: 'separator' },
      {
        id: `delete-${trackId}`,
        label: 'Delete',
        icon: deleteIcon,
        danger: true,
        action: () => deleteTrack(track)
      }
    );
  };

  window.addEventListener('rolfsound-context-build', onContextBuild);
  window.addEventListener('pagehide', () => {
    window.removeEventListener('rolfsound-context-build', onContextBuild);
  }, { once: true });

  root?.addEventListener('click', (event) => {
    const filterBtn = event.target.closest('.dl-filter-btn');
    if (filterBtn) {
      root.querySelectorAll('.dl-filter-btn').forEach((btn) => btn.classList.remove('active'));
      filterBtn.classList.add('active');
      activeFilter = filterBtn.dataset.filter || 'all';
      renderLibrary(getCurrentSearchQuery());
      return;
    }

    const actionBtn = event.target.closest('.play-btn');
    if (actionBtn) {
      event.preventDefault();
      event.stopPropagation();
      const card = actionBtn.closest('.track-card');
      const track = findTrackById(card?.dataset.trackId || '');
      if (!track) {
        notify('Track unavailable');
        return;
      }
      playTrack(track);
      return;
    }

    const playlistCard = event.target.closest('.playlist-card');
    if (playlistCard) {
      const playlistId = Number(playlistCard.dataset.playlistId || 0);
      if (!playlistId) return;
      fetch(`/api/playlists/${encodeURIComponent(playlistId)}/tracks`)
        .then((res) => {
          if (!res.ok) throw new Error('Failed to load playlist');
          return res.json();
        })
        .then((data) => {
          const playlist = allPlaylists.find((p) => Number(p.id) === playlistId) || { id: playlistId, name: 'Playlist' };
          const tracks = Array.isArray(data.tracks) ? data.tracks : [];
          openPlaylistFolder(playlistCard, playlist, tracks);
        })
        .catch((error) => {
          console.error('Open playlist folder error:', error);
          notify('Failed to open playlist');
        });
    }
  });

  pickerList?.addEventListener('click', async (event) => {
    const item = event.target.closest('.playlist-picker-item');
    if (!item || !pickerTrackId || item.style.cursor === 'default') return;
    const playlistId = Number(item.dataset.playlistId || 0);
    if (!playlistId) return;
    await addTrackToPlaylist(pickerTrackId, playlistId);
    closePlaylistPicker();
  });

  pickerCreate?.addEventListener('click', async () => {
    const currentTrack = pickerTrackId;
    closePlaylistPicker();
    await createPlaylistAndMaybeAddTrack(currentTrack);
  });

  pickerClose?.addEventListener('click', closePlaylistPicker);
  picker?.querySelector('.playlist-picker-backdrop')?.addEventListener('click', closePlaylistPicker);

  window.addEventListener('rolfsound-library-mode-change', (e) => {
    libraryMode = e.detail.mode;
    if (libraryMode === 'digital') {
      loadData();
    } else {
      closeFolder();
      closePlaylistPicker();
    }
  });

  window.addEventListener('rolfsound-search', (e) => {
    // Se o painel de resultados estiver aberto, ele é a fonte única — não filtrar a grid
    if (document.body.dataset.searchPanel === 'open') return;
    const query = (e.detail.query || '').toLowerCase();
    if (libraryMode === 'digital') {
      renderLibrary(query);
    }
  });

  window.addEventListener('rolfsound-search-results', (e) => {
    // Se o painel de resultados estiver aberto, a grid da library não deve filtrar
    if (document.body.dataset.searchPanel === 'open') return;
    if (libraryMode !== 'digital') return;
    if (e.detail?.tab && e.detail.tab !== 'digital' && e.detail.tab !== 'library') return;
    renderLibrary(getCurrentSearchQuery());
  });

  // Quando o painel de search fecha, restaurar a grid completa
  window.addEventListener('rolfsound-search-close', () => {
    if (libraryMode === 'digital') {
      renderLibrary('');
    }
  });

  window.addEventListener('rolfsound-playlist-picker-request', (e) => {
    if (libraryMode !== 'digital') return;
    const trackId = e.detail?.trackId || '';
    if (!trackId) return;
    openPlaylistPicker(trackId);
  });

  window.addEventListener('rolfsound-playlist-deleted', async () => {
    closeFolder();
    await loadData();
  });

  window.addEventListener('rolfsound-playlist-created', async () => {
    await loadData();
  });

  window.addEventListener('rolfsound-playlist-renamed', async (e) => {
    const { playlistId, name } = e.detail || {};
    if (!playlistId || !name) return;
    // Update in-memory list
    const p = allPlaylists.find(p => Number(p.id) === Number(playlistId));
    if (p) p.name = name;
    // Update card title if rendered
    const card = document.querySelector(`.playlist-card[data-playlist-id="${playlistId}"]`);
    if (card) {
      const titleEl = card.querySelector('.track-title, .playlist-name');
      if (titleEl) titleEl.textContent = name;
    }
    // Update open folder modal title if it's this playlist
    if (folderState) {
      const titleEl = folderState.panel.querySelector('.folder-title');
      if (titleEl) titleEl.textContent = name;
    }
  });

  window.addEventListener('rolfsound-playlist-play', async (e) => {
    const playlistId = Number(e.detail?.playlistId || 0);
    if (!playlistId) return;
    await playPlaylist(playlistId);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeFolder();
      closePlaylistPicker();
    }
  });

  if (container && container.classList.contains('active')) {
    loadData();
  }
</script>
