<style>
  #digital-library-container {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 80px 20px 20px 20px;
  }

  #digital-library-container::-webkit-scrollbar {
    width: 8px;
  }

  #digital-library-container::-webkit-scrollbar-track {
    background: transparent;
  }

  #digital-library-container::-webkit-scrollbar-thumb {
    background: var(--color-library-scroll-thumb);
    border-radius: var(--radius-xs);
  }

  #digital-library-container::-webkit-scrollbar-thumb:hover {
    background: var(--color-library-scroll-thumb-hover);
  }

  #tracks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }

  .track-card {
    background: var(--color-surface-card);
    backdrop-filter: blur(10px);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-xl);
    overflow: hidden;
    transition: all 0.2s ease;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }

  .track-card:hover {
    background: var(--color-surface-card-hover);
    border-color: var(--color-border-stronger);
    transform: translateY(-4px);
  }

  .track-thumbnail {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, var(--color-library-thumb-gradient-start), var(--color-library-thumb-gradient-end));
    object-fit: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .track-thumbnail img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .track-thumbnail-fallback {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--color-library-thumb-fallback-start), var(--color-library-thumb-fallback-end));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-size-icon-lg);
    color: var(--color-led);
  }

  .track-actions {
    position: absolute;
    inset: 0;
    background: var(--color-bg-scrim);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .track-card:hover .track-actions {
    opacity: 1;
  }

  .track-action-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-round);
    border: none;
    background: var(--color-surface-card-pressed);
    color: var(--color-text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .track-action-btn:hover {
    background: var(--color-surface-interactive-strong);
    transform: scale(1.1);
  }

  .track-info {
    flex: 1;
    padding: 10px;
    display: flex;
    flex-direction: column;
    min-height: 60px;
  }

  .track-title {
    font-size: var(--fs-sm, 10px);
    font-weight: 600;
    color: var(--color-text-primary);
    white-space: normal;
    line-height: 1.2;
    display: -webkit-box;
    line-clamp: 2;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .track-artist {
    font-size: var(--fs-2xs, 8px);
    color: var(--color-text-tertiary);
    white-space: normal;
    display: -webkit-box;
    line-clamp: 1;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  #digital-library-empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--color-text-muted);
    font-size: var(--fs-lg, 12px);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #digital-library-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-tertiary);
    font-size: var(--fs-md, 11px);
  }

  .empty-subtext {
    font-size: var(--fs-sm, 10px);
    opacity: 0.6;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--color-border-interactive);
    border-top-color: var(--color-text-secondary);
    border-radius: var(--radius-round);
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

<div id="digital-library-container">
  <div id="digital-library-loading" style="display: none;">
    <div class="spinner"></div>
    Loading...
  </div>
  <div id="digital-library-empty" style="display: none;">
    <div>No tracks yet</div>
    <div class="empty-subtext">Search and download music to build your library</div>
  </div>
  <div id="tracks-grid"></div>
</div>

<script type="module">
  const container = document.getElementById('view-digital-library');
  const grid = document.getElementById('tracks-grid');
  const loadingEl = document.getElementById('digital-library-loading');
  const emptyEl = document.getElementById('digital-library-empty');
  const emptyTitleEl = emptyEl?.querySelector('div');
  const emptySubtextEl = emptyEl?.querySelector('.empty-subtext');
  const island = document.querySelector('rolfsound-island');

  let allTracks = [];
  let libraryMode = 'vinyl'; // 'vinyl' | 'digital'

  function thumbSrc(t) {
    if (!t) return null;
    if (t.startsWith('http') || t.startsWith('/thumbs/')) return t;
    return '/thumbs/' + t.split(/[\\/]/).pop();
  }

  function getThumbnailCandidates(track) {
    const normalized = thumbSrc(track?.thumbnail || '');
    const trackId = getTrackId(track);
    const candidates = [];
    const isYouTubeId = typeof trackId === 'string' && /^[A-Za-z0-9_-]{11}$/.test(trackId);

    if (isYouTubeId) {
      candidates.push(`https://i.ytimg.com/vi/${trackId}/maxresdefault.jpg`);
      candidates.push(`https://i.ytimg.com/vi/${trackId}/hqdefault.jpg`);
    }

    if (normalized) {
      if (normalized.includes('i.ytimg.com/vi/')) {
        candidates.push(normalized.replace(/\/(?:default|mqdefault|hqdefault|sddefault|maxresdefault)\.(?:jpg|webp).*$/i, '/maxresdefault.jpg'));
        candidates.push(normalized.replace(/\/(?:default|mqdefault|hqdefault|sddefault|maxresdefault)\.(?:jpg|webp).*$/i, '/hqdefault.jpg'));
      }
      candidates.push(normalized);
    }

    return [...new Set(candidates.filter(Boolean))];
  }

  function hydrateTrackThumbnails(tracks) {
    const images = grid.querySelectorAll('.track-thumbnail img[data-track-id]');

    images.forEach((img, index) => {
      const track = tracks[index];
      const candidates = getThumbnailCandidates(track);
      if (!candidates.length) return;

      let candidateIndex = 0;
      img.onerror = () => {
        candidateIndex += 1;
        if (candidateIndex >= candidates.length) {
          img.onerror = null;
          return;
        }
        img.src = candidates[candidateIndex];
      };
    });
  }

  function escapeHtml(value) {
    const div = document.createElement('div');
    div.textContent = value ?? '';
    return div.innerHTML;
  }

  function getTrackId(track) {
    return track?.id || track?.track_id || '';
  }

  function getTrackPath(track) {
    return track?.file_path || track?.filepath || '';
  }

  function getCurrentSearchQuery() {
    return (island?.shadowRoot?.getElementById('search-input')?.value || '').trim().toLowerCase();
  }

  function notify(text, spinner = false, duration = 2200) {
    if (typeof island?.showNotification === 'function') {
      island.showNotification({ text, spinner, duration });
    }
  }

  function refreshPlaybackStatus(delay = 200) {
    if (typeof window.playbackMitosisManager?.pollStatus === 'function') {
      window.setTimeout(() => window.playbackMitosisManager.pollStatus(), delay);
    }
  }

  function setEmptyState(title, subtitle = 'Search and download music to build your library') {
    if (emptyTitleEl) emptyTitleEl.textContent = title;
    if (emptySubtextEl) emptySubtextEl.textContent = subtitle;
    emptyEl.style.display = 'flex';
  }

  function clearEmptyState() {
    emptyEl.style.display = 'none';
    if (emptyTitleEl) emptyTitleEl.textContent = 'No tracks yet';
    if (emptySubtextEl) emptySubtextEl.textContent = 'Search and download music to build your library';
  }

  function findTrackById(trackId) {
    return allTracks.find(track => getTrackId(track) === trackId) || null;
  }

  // Escuta mudanças de modo (vinyl <-> digital)
  window.addEventListener('rolfsound-library-mode-change', (e) => {
    libraryMode = e.detail.mode;
    if (libraryMode === 'digital') {
      loadTracks();
    }
  });

  // Busca vinda da ilha (fallback) e do SearchController (preferencial)
  window.addEventListener('rolfsound-search', (e) => {
    const query = (e.detail.query || '').toLowerCase();
    if (libraryMode === 'digital') {
      filterTracks(query);
    }
  });

  window.addEventListener('rolfsound-search-results', (e) => {
    if (libraryMode !== 'digital') return;

    // Se vier do controller para outra aba, ignora.
    if (e.detail?.tab && e.detail.tab !== 'digital' && e.detail.tab !== 'library') return;

    filterTracks(getCurrentSearchQuery());
  });

  const onContextBuild = (e) => {
    const context = e.detail?.context;
    const items = e.detail?.items;

    if (!context || !Array.isArray(items)) return;
    if (libraryMode !== 'digital' || !container?.classList.contains('active')) return;

    const card = context.cardElement || context.target?.closest?.('.track-card');
    if (!card || !grid.contains(card)) return;

    const track = findTrackById(card.dataset.trackId || '');
    if (!track) return;

    const trackId = getTrackId(track) || 'track';

    const playIcon   = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
    const queueIcon  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 9v2h14V9H7z"/></svg>`;
    const deleteIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>`;

    items.push(
      {
        id: `play-${trackId}`,
        label: 'Play',
        icon: playIcon,
        action: () => playTrack(track)
      },
      {
        id: `queue-${trackId}`,
        label: 'Add to Queue',
        icon: queueIcon,
        action: () => queueTrack(track)
      },
      { type: 'separator' },
      {
        id: `delete-${trackId}`,
        label: 'Delete',
        icon: deleteIcon,
        danger: true,
        action: () => deleteTrack(track)
      }
    );
  };

  window.addEventListener('rolfsound-context-build', onContextBuild);
  window.addEventListener('pagehide', () => {
    window.removeEventListener('rolfsound-context-build', onContextBuild);
  }, { once: true });

  grid?.addEventListener('click', async (event) => {
    const actionBtn = event.target.closest('.play-btn');
    if (!actionBtn) return;

    event.preventDefault();
    event.stopPropagation();

    const card = actionBtn.closest('.track-card');
    const track = findTrackById(card?.dataset.trackId || '');

    if (!track) {
      console.warn('Digital library play action failed: track not found');
      notify('Track unavailable');
      return;
    }

    await playTrack(track);
  });

  async function loadTracks() {
    loadingEl.style.display = 'flex';
    grid.innerHTML = '';
    clearEmptyState();

    try {
      const response = await fetch('/api/library');
      if (!response.ok) throw new Error(`Failed to fetch library (${response.status})`);

      const data = await response.json();
      allTracks = Array.isArray(data.tracks) ? data.tracks : [];

      loadingEl.style.display = 'none';

      if (allTracks.length === 0) {
        setEmptyState('No tracks yet');
        grid.innerHTML = '';
        return;
      }

      filterTracks(getCurrentSearchQuery());
    } catch (error) {
      console.error('Error loading tracks:', error);
      loadingEl.style.display = 'none';
      grid.innerHTML = '';
      setEmptyState('Failed to load', 'Please try again in a moment');
    }
  }

  function filterTracks(query) {
    if (!query) {
      renderTracks(allTracks);
      return;
    }

    const filtered = allTracks.filter(track => {
      const title = (track.title || '').toLowerCase();
      const artist = (track.artist || '').toLowerCase();
      return title.includes(query) || artist.includes(query);
    });

    if (filtered.length === 0) {
      grid.innerHTML = '';
      setEmptyState('No results', 'Try another title or artist');
      return;
    }

    renderTracks(filtered);
  }

  function renderTracks(tracks) {
    if (!Array.isArray(tracks) || tracks.length === 0) {
      grid.innerHTML = '';
      setEmptyState('No tracks yet');
      return;
    }

    clearEmptyState();

    grid.innerHTML = tracks.map(track => {
      const trackId = getTrackId(track);
      const title = escapeHtml(track.title || 'Unknown');
      const artist = escapeHtml(track.artist || 'Unknown Artist');
      const thumbnailCandidates = getThumbnailCandidates(track);
      const primaryThumbnail = thumbnailCandidates[0] || null;

      return `
        <div class="track-card" data-track-id="${escapeHtml(trackId)}">
          <div class="track-thumbnail">
            ${primaryThumbnail ? `
              <img src="${escapeHtml(primaryThumbnail)}" data-track-id="${escapeHtml(trackId)}" alt="${title}" loading="lazy" />
            ` : `
              <div class="track-thumbnail-fallback">♫</div>
            `}
            <div class="track-actions">
              <button class="track-action-btn play-btn" title="Play" aria-label="Play track">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="track-info">
            <div class="track-title">${title}</div>
            <div class="track-artist">${artist}</div>
          </div>
        </div>
      `;
    }).join('');

    hydrateTrackThumbnails(tracks);
  }

  async function playTrack(track) {
    const trackId = getTrackId(track);
    if (!trackId) {
      notify('Invalid track');
      return;
    }

    try {
      const response = await fetch('/api/play', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          track_id: trackId,
          filepath: getTrackPath(track)
        })
      });

      if (!response.ok) {
        throw new Error(`Play failed (${response.status})`);
      }

      notify('Playing now');
      refreshPlaybackStatus(150);
    } catch (e) {
      console.error('Play error:', e);
      notify('Play failed');
    }
  }

  async function queueTrack(track) {
    const trackId = getTrackId(track);
    if (!trackId) {
      notify('Invalid track');
      return;
    }

    try {
      const response = await fetch('/api/queue/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          track_id: trackId,
          filepath: getTrackPath(track),
          title: track.title || '',
          thumbnail: track.thumbnail || ''
        })
      });

      if (!response.ok) {
        throw new Error(`Queue failed (${response.status})`);
      }

      notify('Added to queue');
      refreshPlaybackStatus(120);
    } catch (e) {
      console.error('Queue error:', e);
      notify('Queue failed');
    }
  }

  async function deleteTrack(track) {
    const trackId = getTrackId(track);
    if (!trackId) {
      notify('Invalid track');
      return;
    }

    if (!confirm(`Delete "${track.title || 'this track'}"?`)) return;

    try {
      const response = await fetch(`/api/library/${encodeURIComponent(trackId)}`, { method: 'DELETE' });
      if (!response.ok) {
        throw new Error(`Delete failed (${response.status})`);
      }

      allTracks = allTracks.filter(t => getTrackId(t) !== trackId);
      filterTracks(getCurrentSearchQuery());
      notify('Deleted');
      refreshPlaybackStatus(120);
    } catch (e) {
      console.error('Delete error:', e);
      notify('Delete failed');
    }
  }

  // Load digital library ao entrar nessa view
  if (container && container.classList.contains('active')) {
    loadTracks();
  }
</script>
